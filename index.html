    function AddPostModal({ onClose, onSubmit, triggerToast }) {
      const [name, setName] = useState("");
      const [price, setPrice] = useState("");
      const [type, setType] = useState("Bechna");
      const [category, setCategory] = useState("Anaj");
      const [photo, setPhoto] = useState("");
      const [desc, setDesc] = useState("");

      const handlePhotoSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        compressAndLoadPhoto(file, (compressedBase64) => {
          setPhoto(compressedBase64);
        });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!photo) return triggerToast("कृपया सामान की फ़ोटो अपलोड करें (यह अनिवार्य है)!", true);
        if (!name.trim()) return triggerToast("सामान का नाम दर्ज करें!");
        if (!price || isNaN(price)) return triggerToast("मान्य मूल्य दर्ज करें!");

        onSubmit({
          name: name.trim(),
          price: price.trim(),
          type,
          category,
          photo,
          description: desc.trim()
        });
      };

      return (
        <div class="fixed inset-0 bg-white z-50 flex flex-col p-4 overflow-y-auto animate-slideUp text-left h-full">
          <div class="flex items-center justify-between border-b pb-3 mb-4">
            <h3 class="text-base font-extrabold text-[#2E7D32] font-sans">🆕 नया सामान बाज़ार में जोड़ें</h3>
            <button onClick={onClose} class="p-2 px-4 bg-gray-100 font-bold rounded-xl text-xs hover:bg-gray-200 transition font-sans cursor-pointer">
              रद्द करें (Cancel)
            </button>
          </div>

            <form onSubmit={handleSubmit} class="space-y-4 text-xs font-sans">
              <div class="grid grid-cols-2 gap-2 bg-gray-50 p-1 rounded-xl border">
                <button
                  type="button"
                  onClick={() => setType("Bechna")}
                  class={`py-2 text-center rounded-lg font-bold transition ${type === "Bechna" ? "bg-orange-600 text-white" : "text-gray-600"}`}
                >
                  भेजना है (Sell)
                </button>
                <button
                  type="button"
                  onClick={() => setType("Kharidna")}
                  class={`py-2 text-center rounded-lg font-bold transition ${type === "Kharidna" ? "bg-blue-600 text-white" : "text-gray-600"}`}
                >
                  खरीदना है (Buy)
                </button>
              </div>

              {/* Photo Input (Mandatory constraint verified) */}
              <div>
                <label class="block font-bold text-gray-700 mb-1">सामान की फ़ोटो * (अनिवार्य / Category Photo)</label>
                <div class="mt-1 flex items-center space-x-3 bg-orange-50/50 p-3 rounded-2xl border-2 border-dashed border-orange-300">
                  {photo ? (
                    <img src={photo} class="w-20 h-20 rounded-xl object-contain border bg-white" alt="Thumbnail" />
                  ) : (
                    <div class="w-20 h-20 bg-gray-100 rounded-xl flex flex-col items-center justify-center text-gray-400">
                      <i class="fa-solid fa-image text-2xl"></i>
                      <span class="text-[8px] mt-1 text-red-500 font-bold">फ़ोटो आवश्यक!</span>
                    </div>
                  )}
                  <div class="flex-1">
                    <label class="px-4 py-2.5 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-xl cursor-pointer inline-block shadow-xs transition">
                      <i class="fa-solid fa-upload mr-1"></i> अपलोड फ़ोटो
                      <input type="file" accept="image/*" class="hidden" onChange={handlePhotoSelect} required />
                    </label>
                    <p class="text-[9px] text-gray-400 mt-1">अपने कृषि उत्पाद या सामान की स्पष्ट तस्वीर अपलोड करें</p>
                  </div>
                </div>
              </div>

              <div>
                <label class="block font-bold text-gray-700 mb-1">सामान का नाम (Product Name) *</label>
                <input 
                  type="text" 
                  placeholder="जैसे: सुधरा हुआ चारा कटर / रोटावेटर मशीन"
                  value={name} 
                  onChange={e => setName(e.target.value)}
                  class="w-full p-3 bg-gray-50 border rounded-xl focus:border-primary focus:bg-white focus:outline-none"
                  required
                />
              </div>

              <div class="grid grid-cols-2 gap-2">
                <div>
                  <label class="block font-bold text-gray-700 mb-1">कीमत (₹) *</label>
                  <input 
                    type="number" 
                    placeholder="जैसे: 1500"
                    value={price} 
                    onChange={e => setPrice(e.target.value)}
                    class="w-full p-3 bg-gray-50 border rounded-xl focus:border-primary focus:bg-white focus:outline-none font-bold"
                    required
                  />
                </div>
                <div>
                  <label class="block font-bold text-gray-700 mb-1">केटेगरी *</label>
                  <select 
                    value={category} 
                    onChange={e => setCategory(e.target.value)}
                    class="w-full p-3 bg-gray-50 border rounded-xl focus:border-primary focus:bg-white focus:outline-none appearance-none font-bold"
                    required
                  >
                    {BAZAAR_CATEGORIES.map(cat => (
                      <option key={cat} value={cat}>{BAZAAR_CATEGORIES_LABELS[cat]}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div>
                <label class="block font-bold text-gray-700 mb-1">संक्षिप्त विवरण (Short Details - वैकल्पिक)</label>
                <textarea 
                  rows="2" 
                  placeholder="सामान की स्थिति या काम के बारे में संक्षेप में विवरण दें..."
                  value={desc} 
                  onChange={e => setDesc(e.target.value)}
                  class="w-full p-3 bg-gray-50 border rounded-xl focus:border-primary focus:bg-white focus:outline-none resize-none"
                ></textarea>
              </div>

              <button 
                type="submit" 
                class="w-full py-3.5 bg-primary hover:bg-green-800 text-white font-bold rounded-xl text-sm transition shadow-lg flex items-center justify-center space-x-1 active:scale-95"
              >
                <span>🚀 बाज़ार में पब्लिश करें</span>
              </button>
              
              {/* Keyboard clearance spacing buffer so input elements do not stay hidden under software keyboard */}
              <div class="h-32"></div>
            </form>
          </div>
      );
    }

    // ──────────────────────────────────────────────────────────
    // Sampark Suchi Directory Component overlay
    // ──────────────────────────────────────────────────────────
    function DirectoryView({ allUsers, onClose }) {
      const [searchTerm, setSearchTerm] = useState("");
      const [selectedFilter, setSelectedFilter] = useState("All");

      // Sort and Gating logic for the Directory (Doctor role sorting first)
      const sortedUsers = [...allUsers].sort((a,b) => {
        if (a.role === "Doctor" && b.role !== "Doctor") return -1;
        if (a.role !== "Doctor" && b.role === "Doctor") return 1;
        return a.name?.localeCompare(b.name);
      });

      const filtered = sortedUsers.filter(u => {
        const matchesSearch = u.name?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                              u.role?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                              u.gaon?.toLowerCase().includes(searchTerm.toLowerCase());
        const matchesRole = selectedFilter === "All" ? true : u.role === selectedFilter;
        return matchesSearch && matchesRole;
      });

      return (
        <div class="fixed inset-0 bg-bgLight z-40 max-w-md w-full mx-auto flex flex-col p-4 animate-fadeIn pb-24">
          <div class="flex items-center justify-between border-b pb-3 mb-3">
            <div>
              <h2 class="text-xl font-extrabold text-[#2E7D32] font-sans">📋 गाँव संपर्क सूची (Directory)</h2>
              <p class="text-[10px] text-gray-500 font-sans font-medium">सभी गांवों के नागरिकों और डॉक्टरों की जानकारी</p>
            </div>
            <button onClick={onClose} class="p-2 px-3 bg-white text-gray-600 rounded-xl hover:bg-gray-200 font-bold border">
              बंद करें (Close)
            </button>
          </div>

          <div class="space-y-3 mb-3">
            {/* Search Input bar */}
            <div class="relative">
              <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
              <input 
                type="text" 
                placeholder="नाम, काम या गांव लिखकर ढूंढें..."
                value={searchTerm} 
                onChange={e => setSearchTerm(e.target.value)}
                class="w-full pl-9 pr-4 py-3 bg-white border border-gray-200 rounded-xl focus:border-primary focus:outline-none text-xs font-sans shadow-xs"
              />
            </div>

            {/* Role Filter pills */}
            <div class="flex overflow-x-auto space-x-2 pb-1 text-[10px] no-scrollbar">
              <button 
                onClick={() => setSelectedFilter("All")}
                class={`px-3.5 py-1.5 rounded-full font-bold whitespace-nowrap border transition ${selectedFilter === "All" ? "bg-primary text-white" : "bg-white text-gray-600"}`}
              >
                सभी संपर्क
              </button>
              {ROLES.map(role => (
                <button
                  key={role.id}
                  onClick={() => setSelectedFilter(role.id)}
                  class={`px-3.5 py-1.5 rounded-full font-bold whitespace-nowrap border transition ${selectedFilter === role.id ? "bg-primary text-white" : "bg-white text-gray-600"}`}
                >
                  {role.label}
                </button>
              ))}
            </div>
          </div>

          {/* directory lists scroll view Container */}
          <div class="flex-grow overflow-y-auto space-y-3 no-scrollbar pr-1 pb-4">
            {filtered.length === 0 ? (
              <div class="text-center bg-white rounded-3xl p-8 text-gray-400 text-xs border font-sans">
                🔍 कोई संपर्क नहीं मिला।
              </div>
            ) : (
              filtered.map((userCard) => (
                <div key={userCard.deviceId} class="bg-white rounded-2xl p-3 border border-gray-100 shadow-xs flex items-center justify-between">
                  {/* Left profile data info */}
                  <div class="flex items-center space-x-3">
                    {userCard.photo ? (
                      <img src={userCard.photo} class="w-12 h-12 rounded-full object-cover border-2 border-primary" alt="Profile" />
                    ) : (
                      <div class="w-12 h-12 rounded-full bg-primary/10 text-primary font-bold flex items-center justify-center text-lg">
                        {userCard.naam ? userCard.naam[0] : "👤"}
                      </div>
                    )}
                    <div class="leading-snug">
                      <div class="flex items-center space-x-1.5">
                        <h4 class="text-xs font-bold text-gray-800 font-sans">{userCard.naam}</h4>
                        <span class={`px-2 py-0.2 px-1.5 rounded-lg text-[9px] font-bold ${userCard.role === "Doctor" ? "bg-red-100 text-red-700 border border-red-200" : "bg-green-100 text-green-700 border border-green-200"}`}>
                          {ROLES.find(r => r.id === userCard.role)?.label || userCard.role}
                        </span>
                      </div>
                      <p class="text-[9px] text-gray-400 mt-0.5 font-sans"><i class="fa-solid fa-map-pin mr-1 text-gray-400"></i>📍 {userCard.gaon}</p>
                    </div>
                  </div>

                  {/* Call Button Trigger */}
                  <a 
                    href={`tel:${userCard.mobile}`}
                    class="p-2.5 bg-primary hover:bg-green-800 text-white rounded-xl transition shadow-xs flex items-center justify-center active:scale-95"
                    style={{ minWidth: "44px", minHeight: "44px" }}
                  >
                    <i class="fa-solid fa-phone text-xs"></i>
                  </a>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // ──────────────────────────────────────────────────────────
    // Panchayat Grievance & Village News Bulletin Board (ChatView)
    // ──────────────────────────────────────────────────────────
    function ChatView({ user, dbRef, triggerToast, openOverlay }) {
      const [subTab, setSubTab] = useState("complaints"); // complaints | news
      const [complaints, setComplaints] = useState([]);
      const [newsList, setNewsList] = useState([]);

      // Form States for adding a Complaint
      const [showAddComplaint, setShowAddComplaint] = useState(false);
      const [compTitle, setCompTitle] = useState("");
      const [compDesc, setCompDesc] = useState("");
      const [compCategory, setCompCategory] = useState("sarak");
      const [compPhoto, setCompPhoto] = useState("");

      // Form States for sharing local News
      const [showAddNews, setShowAddNews] = useState(false);
      const [newsTitle, setNewsTitle] = useState("");
      const [newsDetails, setNewsDetails] = useState("");
      const [newsCategory, setNewsCategory] = useState("Khabar");
      const [newsPhoto, setNewsPhoto] = useState("");

      // Comments View States
      const [selectedItemForComments, setSelectedItemForComments] = useState(null);
      const [selectedItemType, setSelectedItemType] = useState(""); // "complaint" | "news"

      const villageKey = getCleanVillagePath(user.gaon);

      const COMP_CATEGORIES = {
        sarak: "🚧 टूटी सड़क (Road)",
        bijli: "💡 बिजली व लाइट (Electricity)",
        paani: "💧 पेयजल व पानी (Water)",
        safai: "🧹 गाँव साफ-सफाई (Sanitation)",
        any: "📦 अन्य समस्या (Others)"
      };

      const NEWS_CATEGORIES = {
        Khabar: "📰 गाँव समाचार (Local News)",
        Mausam: "☁️ मौसम जानकारी (Weather Update)",
        Krishi: "🌾 कृषि जानकारी (Agri Bulletin)",
        Panchayat: "👑 सरकारी सूचना (Govt Directive)"
      };

      // Connect to Firebase and listen to both resources
      useEffect(() => {
        // --- 1. COMPLAINTS LISTENER ---
        const compRef = dbRef ? dbRef.ref(`complaints/${villageKey}`) : null;
        if (compRef) {
          compRef.on("value", (snapshot) => {
            const data = snapshot.val();
            const list = [];
            if (data) {
              Object.keys(data).forEach((k) => {
                list.push({ id: k, ...data[k] });
              });
            }
            // Sort new complaints first
            setComplaints(list.sort((a, b) => b.timestamp - a.timestamp));
          });
        } else {
          // Backup offline cached fallback
          const local = JSON.parse(localStorage.getItem(`offline_complaints_${villageKey}`) || "[]");
          setComplaints(local);
        }

        // --- 2. NEWS BULLETIN LISTENER ---
        const newsRef = dbRef ? dbRef.ref(`news/${villageKey}`) : null;
        if (newsRef) {
          newsRef.on("value", (snapshot) => {
            const data = snapshot.val();
            const list = [];
            if (data) {
              Object.keys(data).forEach((k) => {
                list.push({ id: k, ...data[k] });
              });
            }
            setNewsList(list.sort((a, b) => b.timestamp - a.timestamp));
          });
        } else {
          // Backup offline cached fallback
          const local = JSON.parse(localStorage.getItem(`offline_news_${villageKey}`) || "[]");
          setNewsList(local);
        }

        return () => {
          if (compRef) compRef.off();
          if (newsRef) newsRef.off();
        };
      }, [villageKey, dbRef]);

      // Handle Adding new Complaint
      const handleCreateComplaint = (e) => {
        e.preventDefault();
        if (!compTitle.trim() || !compDesc.trim()) {
          triggerToast("सभी अनिवार्य क्षेत्रों को पूरा करें!");
          return;
        }

        const newComp = {
          title: compTitle.trim(),
          description: compDesc.trim(),
          category: compCategory,
          photo: compPhoto,
          status: "Pending", // Pending, In-Progress, Resolved
          senderName: user.naam,
          senderMobile: user.mobile,
          role: user.role,
          timestamp: Date.now(),
          upvotes: {}, // maps deviceId -> true
          upvoteCount: 0
        };

        if (dbRef) {
          dbRef.ref(`complaints/${villageKey}`).push(newComp)
            .then(() => {
              setCompTitle("");
              setCompDesc("");
              setCompPhoto("");
              setShowAddComplaint(false);
              triggerToast("📝 शिकायत सफलतापूर्वक दर्ज की गई!");
            })
            .catch((err) => {
              console.error(err);
              triggerToast("दर्ज करने में कुछ समस्या आई!", true);
            });
        } else {
          // Local fallback
          const key = `offline_complaints_${villageKey}`;
          const current = JSON.parse(localStorage.getItem(key) || "[]");
          newComp.id = "local_comp_" + Date.now();
          current.unshift(newComp);
          localStorage.setItem(key, JSON.stringify(current));
          setComplaints(current);
          
          setCompTitle("");
          setCompDesc("");
          setCompPhoto("");
          setShowAddComplaint(false);
          triggerToast("ऑफलाइन मोड: शिकायत सहेजी गई! 💾");
        }
      };

      // Handle Adding local News
      const handleCreateNews = (e) => {
        e.preventDefault();
        if (!newsTitle.trim() || !newsDetails.trim()) {
          triggerToast("समाचार का शीर्षक और विवरण लिखें!");
          return;
        }

        const newBulletin = {
          title: newsTitle.trim(),
          details: newsDetails.trim(),
          category: newsCategory,
          photo: newsPhoto,
          authorName: user.naam,
          authorRole: user.role,
          timestamp: Date.now()
        };

        if (dbRef) {
          dbRef.ref(`news/${villageKey}`).push(newBulletin)
            .then(() => {
              setNewsTitle("");
              setNewsDetails("");
              setNewsPhoto("");
              setShowAddNews(false);
              triggerToast("📰 गाँव समाचार साझा किया गया!");
            })
            .catch((err) => {
              console.error(err);
              triggerToast("साझा करने में कुछ समस्या आई!", true);
            });
        } else {
          // Local fallback
          const key = `offline_news_${villageKey}`;
          const current = JSON.parse(localStorage.getItem(key) || "[]");
          newBulletin.id = "local_news_" + Date.now();
          current.unshift(newBulletin);
          localStorage.setItem(key, JSON.stringify(current));
          setNewsList(current);

          setNewsTitle("");
          setNewsDetails("");
          setNewsPhoto("");
          setShowAddNews(false);
          triggerToast("ऑफलाइन मोड: समाचार सहेजा गया! 💾");
        }
      };

      // Upvote/Downvote complaint
      const handleUpvote = (compItem) => {
        const votes = compItem.upvotes || {};
        const isUpvoted = !!votes[user.deviceId];
        const newVotes = { ...votes };
        
        if (isUpvoted) {
          delete newVotes[user.deviceId];
        } else {
          newVotes[user.deviceId] = true;
        }

        const count = Object.keys(newVotes).length;

        if (dbRef && compItem.id && !compItem.id.startsWith("local_")) {
          dbRef.ref(`complaints/${villageKey}/${compItem.id}`).update({
            upvotes: newVotes,
            upvoteCount: count
          }).catch(err => console.error("Upvote error", err));
        } else {
          // Local storage update
          const key = `offline_complaints_${villageKey}`;
          const current = JSON.parse(localStorage.getItem(key) || "[]");
          const idx = current.findIndex(c => c.id === compItem.id);
          if (idx !== -1) {
            current[idx].upvotes = newVotes;
            current[idx].upvoteCount = count;
            localStorage.setItem(key, JSON.stringify(current));
            setComplaints(current);
          }
        }
      };

      // Toggle status of a complaint
      const toggleStatus = (compItem) => {
        let nextStatus = "Pending";
        if (compItem.status === "Pending") nextStatus = "In-Progress";
        else if (compItem.status === "In-Progress") nextStatus = "Resolved";
        else nextStatus = "Pending";

        if (dbRef && compItem.id && !compItem.id.startsWith("local_")) {
          dbRef.ref(`complaints/${villageKey}/${compItem.id}`).update({
            status: nextStatus
          }).then(() => {
            triggerToast("स्थिति अपडेट हो गई: " + (nextStatus === "Resolved" ? "समाधान हो गया ✅" : nextStatus === "In-Progress" ? "कार्य प्रगति पर ⚙️" : "लंबित ⏳"));
          }).catch(err => console.error("Status update error", err));
        } else {
          // Local storage update
          const key = `offline_complaints_${villageKey}`;
          const current = JSON.parse(localStorage.getItem(key) || "[]");
          const idx = current.findIndex(c => c.id === compItem.id);
          if (idx !== -1) {
            current[idx].status = nextStatus;
            localStorage.setItem(key, JSON.stringify(current));
            setComplaints(current);
            triggerToast("ऑफलाइन मोड स्थिति अपडेट हो गई!");
          }
        }
      };

      const handlePhotoSelectComp = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        compressAndLoadPhoto(file, (base64) => setCompPhoto(base64));
      };

      const handlePhotoSelectNews = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        compressAndLoadPhoto(file, (base64) => setNewsPhoto(base64));
      };

      return (
        <div class="flex-grow flex flex-col bg-slate-50 rounded-3xl overflow-hidden h-[80vh] border shadow-xs animate-fadeIn pb-4 relative">
          
          {/* Header metadata layout banner */}
          <div class="bg-red-700 p-4 text-white flex items-center justify-between shadow-sm">
            <div class="flex items-center space-x-2">
              <span class="text-xl">📋</span>
              <div class="leading-none">
                <h4 class="text-sm font-extrabold font-sans">गाँव की शिकायतें व समस्या समाधान</h4>
                <p class="text-[10px] text-red-100 font-semibold font-sans">📍 {user.gaon} पंचायत</p>
              </div>
            </div>
            <button 
              type="button"
              onClick={() => openOverlay(setShowAddComplaint)}
              class="px-3 py-2 bg-white text-red-700 hover:bg-red-50 rounded-xl font-extrabold flex items-center space-x-1 font-sans text-xs shadow-md active:scale-95 transition cursor-pointer"
            >
              <span>+ समस्या दर्ज करें</span>
            </button>
          </div>

          <div class="bg-white border-b px-4 py-2.5 flex items-center justify-between text-xs text-gray-550 font-bold">
            <span>📋 कुल दर्ज मामले: {complaints.length}</span>
            <span class="text-red-500 bg-red-50 px-2 py-0.5 rounded-full text-[10px]">बिजली, पानी, सड़क एवं अन्य समस्या</span>
          </div>

          {/* Main List Container */}
          <div class="flex-1 overflow-y-auto p-3 space-y-3 pb-16 no-scrollbar">
            
            {subTab === "complaints" ? (
              complaints.length === 0 ? (
                <div class="h-full flex flex-col items-center justify-center text-center text-gray-400 p-8 pt-16">
                  <span class="text-4xl block mb-2">📋</span>
                  <p class="text-xs font-bold font-sans text-gray-700">अभी कोई शिकायत दर्ज नहीं है।</p>
                  <p class="text-[10px] text-gray-400 mt-1 leading-snug">यदि आपके गाँव में पानी, सड़क, बिजली जैसी कोई समस्या है, तो उपर दिये बटन को दबाकर दर्ज करें।</p>
                </div>
              ) : (
                complaints.map((item) => {
                  const isUpvoted = item.upvotes && !!item.upvotes[user.deviceId];
                  const upvoteNum = item.upvoteCount || 0;
                  
                  return (
                    <div key={item.id} class="bg-white border rounded-2xl shadow-xs overflow-hidden flex flex-col text-left">
                      {/* Sub card header */}
                      <div class="p-3 bg-gray-50 border-b flex items-start justify-between gap-1">
                        <div class="leading-none">
                          <span class="px-2 py-0.5 bg-gray-200 text-gray-800 font-bold font-sans rounded text-[9px] uppercase tracking-wider">
                            {COMP_CATEGORIES[item.category] || "📦 अन्य समस्या"}
                          </span>
                          <p class="text-[9px] text-gray-400 mt-2 mb-0 font-medium font-sans">
                            {item.senderName} ({ROLES.find(r => r.id === item.role)?.label?.split(" ")[0] || "👤"}) • {new Date(item.timestamp).toLocaleDateString()}
                          </p>
                        </div>

                        {/* Status Badge */}
                        <div 
                          onClick={() => toggleStatus(item)}
                          class={`px-2 py-0.5 rounded text-[9px] font-bold cursor-pointer font-sans select-none flex items-center space-x-1 transition active:scale-95 ${
                            item.status === "Resolved" 
                              ? "bg-green-100 text-green-800 border-green-200" 
                              : item.status === "In-Progress"
                                ? "bg-blue-100 text-blue-800 border-blue-200"
                                : "bg-amber-100 text-amber-800 border-amber-200"
                          } border`}
                          title="बदलने के लिए क्लिक करें"
                        >
                          <span>{
                            item.status === "Resolved" 
                              ? "✅ समाधान हो गया" 
                              : item.status === "In-Progress"
                                ? "🛠️ काम चालू है"
                                : "⏱️ लंबित (Pending)"
                          }</span>
                          <i class="fa-solid fa-arrows-spin text-[8px] opacity-60 ml-0.5"></i>
                        </div>
                      </div>

                      {/* Sub card body with photo */}
                      <div class="p-3 text-xs space-y-2">
                        <h4 class="font-extrabold text-gray-800 font-sans text-xs">{item.title}</h4>
                        <p class="text-gray-600 font-sans leading-relaxed text-[11px] whitespace-pre-wrap">{item.description}</p>
                        
                        {item.photo && (
                          <div class="mt-2 bg-gray-100 rounded-xl overflow-hidden max-h-48 flex justify-center border">
                            <img src={item.photo} alt="Grievance Scene" class="w-full h-full object-contain max-h-48" />
                          </div>
                        )}
                      </div>

                      {/* Upvotes & Status Actions */}
                      <div class="px-3 py-2 bg-gray-50/50 border-t flex items-center justify-between text-[11px]">
                        <button 
                          type="button"
                          onClick={() => handleUpvote(item)}
                          class={`flex items-center space-x-1.5 px-3 py-1.5 rounded-xl border transition cursor-pointer ${
                            isUpvoted 
                              ? "bg-red-50 text-red-600 border-red-200 font-extrabold" 
                              : "bg-white text-gray-500 border-gray-200 hover:text-gray-700 hover:bg-gray-50"
                          }`}
                        >
                          <i class={`fa-${isUpvoted ? 'solid' : 'regular'} fa-heart text-xs`}></i>
                          <span class="font-sans">समर्थन ({upvoteNum})</span>
                        </button>

                        <div class="flex items-center space-x-2">
                          <button 
                            type="button"
                            onClick={() => {
                              setSelectedItemType("complaint");
                              openOverlay(setSelectedItemForComments, item);
                            }}
                            class="p-1.5 px-2.5 bg-purple-50 text-purple-700 hover:bg-purple-100 border border-purple-200 rounded-xl flex items-center justify-center space-x-1 font-sans font-extrabold text-[10px] cursor-pointer"
                          >
                            <i class="fa-solid fa-comments text-purple-650"></i>
                            <span>जवाब / टिप्पणी</span>
                          </button>

                          <a 
                            href={`tel:${item.senderMobile}`}
                            class="p-1 px-2.5 bg-white hover:bg-gray-100 rounded-xl border flex items-center justify-center space-x-1 font-sans text-gray-600 font-bold text-[10px]"
                          >
                            <i class="fa-solid fa-phone text-[9px] text-primary"></i>
                            <span>कॉल</span>
                          </a>
                          
                          <button 
                            type="button"
                            onClick={() => toggleStatus(item)}
                            class="px-2 py-2 bg-gray-200 hover:bg-gray-300 rounded-xl text-[9.5px] font-bold text-gray-700 flex items-center space-x-1 cursor-pointer"
                          >
                            <span class="font-sans">⏱️ स्थिति बदलें</span>
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })
              )
            ) : null
            }
          </div>

          {/* ADD COMPLAINT BACKDROP DIALOG MODAL */}
          {showAddComplaint && (
            <div class="fixed inset-0 bg-black/60 backdrop-blur-xs z-50 flex items-center justify-center p-4">
              <div class="bg-white rounded-3xl p-5 w-full max-w-sm max-h-[82vh] overflow-y-auto shadow-2xl animate-zoomIn">
                <div class="flex items-center justify-between border-b pb-2 mb-3">
                  <h3 class="text-xs font-bold text-gray-800 font-sans">📝 नयी समस्या/शिकायत दर्ज करें</h3>
                  <button type="button" onClick={() => setShowAddComplaint(false)} class="p-1 px-3 text-xs font-bold bg-gray-100 rounded-full hover:bg-gray-200">
                    ✕
                  </button>
                </div>

                <form onSubmit={handleCreateComplaint} class="space-y-3 text-xs font-sans text-left pb-10">
                  <div>
                    <label class="block font-bold text-gray-750 mb-1 leading-none text-[11px]">समस्या का मुख्य विषय/शीर्षक *</label>
                    <input 
                      type="text" 
                      placeholder="जैसे: वार्ड 3 में पीने की पाइपलाइन टूटी है"
                      value={compTitle} 
                      onChange={e => setCompTitle(e.target.value)}
                      class="w-full p-2.5 bg-gray-50 border rounded-xl text-xs outline-none focus:bg-white focus:border-primary"
                      required
                    />
                  </div>

                  <div class="grid grid-cols-2 gap-2">
                    <div>
                      <label class="block font-bold text-gray-750 mb-1 leading-none text-[11px]">समस्या की श्रेणी *</label>
                      <select 
                        value={compCategory} 
                        onChange={e => setCompCategory(e.target.value)}
                        class="w-full p-2.5 bg-gray-50 border rounded-xl text-xs font-bold outline-none cursor-pointer"
                        required
                      >
                        {Object.keys(COMP_CATEGORIES).map(k => (
                          <option key={k} value={k}>{COMP_CATEGORIES[k]}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label class="block font-bold text-gray-750 mb-1 leading-none text-[11px]">गाँव (स्वचालित)</label>
                      <input 
                        type="text" 
                        value={user.gaon} 
                        class="w-full p-2.5 bg-gray-100 text-gray-500 border rounded-xl text-xs outline-none"
                        disabled
                      />
                    </div>
                  </div>

                  <div>
                    <label class="block font-bold text-gray-750 mb-1 leading-none text-[11px]">पूरी समस्या का विवरण *</label>
                    <textarea 
                      rows="3" 
                      placeholder="समस्या का खुलकर वर्णन करें ताकि पंचायत व गांव के लोग समझ सकें..."
                      value={compDesc} 
                      onChange={e => setCompDesc(e.target.value)}
                      class="w-full p-2.5 bg-gray-50 border rounded-xl text-xs outline-none focus:bg-white focus:border-primary resize-none"
                      required
                    ></textarea>
                  </div>

                  <div>
                    <label class="block font-bold text-gray-750 mb-1 leading-none text-[11px]">📸 फोटो जोड़ें (वैकल्पिक)</label>
                    <input 
                      type="file" 
                      accept="image/*" 
                      onChange={handlePhotoSelectComp} 
                      class="w-full p-1.5 bg-gray-50 border rounded-xl text-[10px] cursor-pointer" 
                    />
                    {compPhoto && (
                      <img src={compPhoto} class="mt-2 w-14 h-14 rounded-lg object-contain border bg-white" alt="Attachment Preview" />
                    )}
                  </div>

                  <button 
                    type="submit" 
                    class="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl shadow-md cursor-pointer active:scale-95 transition"
                  >
                    🚀 पंचायत बोर्ड पर दर्ज करें
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* ADD NEWS BULLETIN BACKDROP DIALOG MODAL */}
          {showAddNews && (
            <div class="fixed inset-0 bg-black/60 backdrop-blur-xs z-50 flex items-center justify-center p-4">
              <div class="bg-white rounded-3xl p-5 w-full max-w-sm max-h-[82vh] overflow-y-auto shadow-2xl animate-zoomIn">
                <div class="flex items-center justify-between border-b pb-2 mb-3">
                  <h3 class="text-xs font-bold text-gray-800 font-sans">📰 गाँव की नयी खबर/सूचना साझा करें</h3>
                  <button type="button" onClick={() => setShowAddNews(false)} class="p-1 px-3 text-xs font-bold bg-gray-100 rounded-full hover:bg-gray-200">
                    ✕
                  </button>
                </div>

                <form onSubmit={handleCreateNews} class="space-y-3 text-xs font-sans text-left pb-10">
                  <div>
                    <label class="block font-bold text-gray-755 mb-1 leading-none text-[11px]">खबर का शीर्षक *</label>
                    <input 
                      type="text" 
                      placeholder="जैसे: कल सुबह 10 बजे पंचायत भवन में बैठक"
                      value={newsTitle} 
                      onChange={e => setNewsTitle(e.target.value)}
                      class="w-full p-2.5 bg-gray-50 border rounded-xl text-xs outline-none focus:bg-white focus:border-primary"
                      required
                    />
                  </div>

                  <div class="grid grid-cols-2 gap-2">
                    <div>

    // ──────────────────────────────────────────────────────────
    // Core Comments / Replies Component (CommentsView)
    // ──────────────────────────────────────────────────────────
    function CommentsView({ item, itemType, user, dbRef, onClose, triggerToast }) {
      const [commentText, setCommentText] = useState("");
      const [commentsList, setCommentsList] = useState([]);
      const villageKey = getCleanVillagePath(user.gaon);

      // Connect to Firebase and listen to comments for this entry
      useEffect(() => {
        const commentsPath = `comments/${itemType}/${item.id}`;
        const refObj = dbRef ? dbRef.ref(commentsPath) : null;

        if (refObj) {
          refObj.on("value", (snapshot) => {
            const data = snapshot.val();
            const list = [];
            if (data) {
              Object.keys(data).forEach((k) => {
                list.push({ id: k, ...data[k] });
              });
            }
            // Sort comments chronologically so conversation flows down
            setCommentsList(list.sort((a, b) => a.timestamp - b.timestamp));
          });
        } else {
          // Backup offline cached comments
          const localKey = `offline_comments_${itemType}_${item.id}`;
          const local = JSON.parse(localStorage.getItem(localKey) || "[]");
          setCommentsList(local);
        }

        return () => {
          if (refObj) refObj.off();
        };
      }, [item.id, itemType, dbRef]);

      const handleAddComment = (e) => {
        e.preventDefault();
        if (!commentText.trim()) return;

        const newComment = {
          text: commentText.trim(),
          senderName: user.naam,
          senderMobile: user.mobile,
          role: user.role,
          timestamp: Date.now()
        };

        const commentsPath = `comments/${itemType}/${item.id}`;

        if (dbRef) {
          dbRef.ref(commentsPath).push(newComment)
            .then(() => {
              setCommentText("");
              triggerToast("💬 टिप्पणी जोड़ी गई!");
            })
            .catch((err) => {
              console.error(err);
              triggerToast("टिप्पणी जोड़ने में त्रुटि!", true);
            });
        } else {
          // Local fallback saving
          const localKey = `offline_comments_${itemType}_${item.id}`;
          const current = JSON.parse(localStorage.getItem(localKey) || "[]");
          newComment.id = "local_comm_" + Date.now();
          current.push(newComment);
          localStorage.setItem(localKey, JSON.stringify(current));
          setCommentsList([...current]);
          setCommentText("");
          triggerToast("ऑफलाइन टिप्पणी सहेजी गई! 💾");
        }
      };

      return (
        <div class="fixed inset-0 bg-white z-50 flex flex-col p-4 animate-slideUp text-left h-full">
          {/* Header section with closing action */}
          <div class="flex items-center justify-between border-b pb-3 mb-4 shrink-0">
            <div class="flex items-center space-x-2">
              <button 
                onClick={onClose} 
                class="p-2 hover:bg-gray-100 rounded-xl transition cursor-pointer"
                title="पीछे जाएं"
              >
                <i class="fa-solid fa-arrow-left text-lg text-primary"></i>
              </button>
              <div>
                <h3 class="text-xs font-black text-gray-800 font-sans tracking-wide leading-none">टिप्पणियाँ व जवाब (Replies)</h3>
                <span class="text-[9px] text-gray-400 font-sans mt-1 block">विषय: {item.title || item.details?.substring(0, 30)}...</span>
              </div>
            </div>
            
            <button 
              onClick={onClose} 
              class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-xl text-xs font-sans cursor-pointer active:scale-95 transition"
            >
              बंद करें
            </button>
          </div>

          {/* Core original topic card visualization */}
          <div class="bg-gray-50 border rounded-2xl p-3 mb-4 text-xs font-sans shrink-0">
            <div class="flex items-center justify-between mb-2">
              <span class="px-2 py-0.5 bg-gray-200 text-gray-800 font-extrabold rounded text-[9px] uppercase">
                मूल पोस्ट (Original Post)
              </span>
              <span class="text-[8.5px] text-gray-400 font-medium">
                {new Date(item.timestamp).toLocaleDateString()}
              </span>
            </div>
            <h4 class="font-bold text-gray-800 text-xs mb-1 font-sans">{item.title}</h4>
            <p class="text-gray-600 font-sans text-[11px] line-clamp-2">{item.description || item.details}</p>
          </div>

          {/* Conversation Thread list scroll zone */}
          <div class="flex-1 overflow-y-auto space-y-3 pr-1 pb-24 no-scrollbar">
            {commentsList.length === 0 ? (
              <div class="py-12 flex flex-col items-center justify-center text-center text-gray-400">
                <i class="fa-regular fa-comments text-3xl mb-2 animate-pulse text-gray-300"></i>
                <p class="text-xs font-bold font-sans text-gray-700">अभी तक कोई टिप्पणी नहीं है।</p>
                <p class="text-[9.5px] text-gray-400 leading-normal max-w-[200px] mx-auto mt-1">पहले व्यक्ति बनें और नीचे बॉक्स में अपना जवाब लिखकर सुझाव दें!</p>
              </div>
            ) : (
              commentsList.map((c) => {
                const roleLabel = ROLES.find(r => r.id === c.role)?.label?.split(" ")[0] || "👤";
                return (
                  <div key={c.id} class="bg-white border text-xs font-sans rounded-2xl p-3 flex flex-col space-y-1.5 text-left shadow-xs transition hover:border-gray-300">
                    <div class="flex items-center justify-between">
                      <div class="flex items-center space-x-1.5 leading-none">
                        <span class="font-black text-gray-800 text-[11px] font-sans">{c.senderName}</span>
                        <span class="px-1.5 py-0.5 bg-purple-50 text-purple-700 hover:bg-purple-100 border border-purple-100 font-extrabold text-[8.5px] rounded font-sans uppercase">
                          {roleLabel}
                        </span>
                      </div>
                      <span class="text-[8.5px] text-gray-400 font-medium font-sans">
                        {new Date(c.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                      </span>
                    </div>
                    
                    <p class="text-gray-700 font-sans text-[11px] whitespace-pre-wrap leading-relaxed">{c.text}</p>
                  </div>
                );
              })
            )}
          </div>

          {/* Submit interface docked on bottom right above spacing */}
          <div class="absolute bottom-0 left-0 right-0 bg-white border-t p-3.5 z-10 shrink-0">
            <form onSubmit={handleAddComment} class="flex items-center space-x-2">
              <input 
                type="text" 
                placeholder="यहाँ अपना जवाब/टिप्पणी लिखें (Write reply here)..."
                value={commentText}
                onChange={(e) => setCommentText(e.target.value)}
                class="flex-1 p-3 bg-gray-50 border rounded-2xl text-xs font-sans font-medium outline-none focus:bg-white focus:border-purple-600 transition"
                required
              />
              <button 
                type="submit"
                class="p-3 px-4 bg-purple-605 bg-purple-600 hover:bg-purple-700 text-white font-extrabold rounded-2xl text-xs shadow-md flex items-center justify-center space-x-1 active:scale-95 transition cursor-pointer"
              >
                <i class="fa-solid fa-paper-plane text-[10px]"></i>
                <span class="font-sans">जवाब दें</span>
              </button>
            </form>
          </div>
        </div>
      );
    }

    function ReferView({ user, allUsers, triggerToast }) {
      const [uupi, setUupi] = useState("");
      const [withdrawalHistory, setWithdrawalHistory] = useState([]);
      const [myReferrals, setMyReferrals] = useState([]);

      // Retrieve earnings values
      useEffect(() => {
        const referrals = JSON.parse(localStorage.getItem("referrals") || "[]");
        const list = referrals.filter(r => r.referrerId === user.deviceId);
        setMyReferrals(list);

        const withdrawals = JSON.parse(localStorage.getItem("withdrawals") || "[]");
        const wList = withdrawals.filter(w => w.deviceId === user.deviceId);
        setWithdrawalHistory(wList);
      }, [user.deviceId]);

      // Calculate aggregated stats
      const totalCount = myReferrals.length;
      const approvedCount = myReferrals.filter(r => r.status === "Approved").length;
      const pendingCount = myReferrals.filter(r => r.status === "Pending" || r.status === "Ready").length;
      
      const totalEarned = approvedCount * 2.0;
      const totalPending = pendingCount * 2.0;

      const totalWithdrawn = withdrawalHistory
        .filter(w => w.status === "Approved")
        .reduce((sum, current) => sum + current.amount, 0);

      // WhatsApp Campaign messaging link
      const referralCode = user.referralCode;
      const campaignText = `मेरे कोड ${referralCode} से जुड़ो और हमारे गाँव की डिजिटल चौपाल Gaon Digital का हिस्सा बनो! लिंक: https://gaondigital.app/?ref=${referralCode}`;

      const handleShareWhatsApp = () => {
        const shareUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(campaignText)}`;
        window.open(shareUrl, "_blank");
      };

      const handleCopyToClipboard = () => {
        navigator.clipboard.writeText(referralCode);
        triggerToast("रेफरल कोड कॉपी हो गया है! 📋");
      };

      // Handle custom UPI withdraw request Gating
      const handleWithdrawalRequest = (e) => {
        e.preventDefault();
        if (!uupi.includes("@")) {
          return triggerToast("कृपया एक मान्य UPI ID दर्ज करें (जैसे: name@upi)!", true);
        }

        // Constraints validations
        // Minimum: ₹20 balance requires at least 10 referrals approved
        if (approvedCount < 10) {
          return triggerToast("निकासी के लिए कम से कम 10 स्वीकृत (Approved/Ready) रेफ़र होने चाहिए!", true);
        }

        const balance = totalEarned - totalWithdrawn;
        if (balance < 20) {
          return triggerToast("निकासी के लिए न्यूनतम राशि ₹20 होना अनिवार्य है!", true);
        }

        if (balance > 500) {
          return triggerToast("एक बार में अधिकतम ₹500 ही निकाले जा सकते हैं!", true);
        }

        // Limit to once a month check
        const hasWithdrawnThisMonth = withdrawalHistory.some(w => 
          (Date.now() - w.timestamp) < 30 * 24 * 3600 * 1000
        );
        if (hasWithdrawnThisMonth) {
          return triggerToast("आप महीने में केवल एक बार ही निकासी का अनुरोध भेज सकते हैं!", true);

        const payoutTransaction = {
          id: "wd_" + Math.random().toString(36).slice(2, 9),
          deviceId: user.deviceId,
          name: user.naam,
          upiId: uupi.trim(),
          amount: balance,
          referralsCount: approvedCount,
          timestamp: Date.now(),
          status: "Pending" // Pending, Approved, Rejected
        };

        const allWd = JSON.parse(localStorage.getItem("withdrawals") || "[]");
        allWd.push(payoutTransaction);
        localStorage.setItem("withdrawals", JSON.stringify(allWd));

        setWithdrawalHistory([...withdrawalHistory, payoutTransaction]);
        setUupi("");
        triggerToast("निकासी का अनुरोध एडमिन के पास भेज दिया गया है! ⏳");
      };

      return (
        <div class="space-y-4 animate-fadeIn">

          </div>

          {/* Earnings summary stats card layout */}
          <div class="bg-gradient-to-br from-indigo-700 to-purple-800 p-5 rounded-3xl text-white shadow-md relative">
            <h3 class="text-xs font-bold text-indigo-100 font-sans">आपकी कुल कमाई (Earnings Summary)</h3>
            <div class="flex items-baseline space-x-1.5 mt-1">
              <span class="text-3xl font-extrabold font-sans">₹{totalEarned}</span>
              <span class="text-[10px] text-purple-200">स्वीकृत रेफ़र ₹2 प्रत्येक</span>
            </div>

            <div class="grid grid-cols-2 gap-2 mt-4 border-t border-indigo-500/40 pt-3 text-[11px]">
              <div>
                <p class="text-[9px] text-indigo-200">सत्यापन चल रहा है (Pending)</p>
                <p class="font-bold font-sans mt-0.5">₹{totalPending}</p>
              </div>
              <div>
                <p class="text-[9px] text-indigo-200">विथड्रा किया हुआ राशि (Withdrawn)</p>
                <p class="font-bold font-sans mt-0.5">₹{totalWithdrawn}</p>
              </div>
            </div>

          {/* Referral Code Interactive card */}
          <div class="bg-white p-4 rounded-3xl border shadow-xs flex flex-col items-center text-center space-y-3">
            <p class="text-xs text-gray-500 font-bold font-sans">आपका रेफ़र कोड कार्ड:</p>

            >
              <i class="fa-brands fa-whatsapp text-lg"></i>
              <span>WhatsApp पर मित्रों को शेयर करें</span>

          </div>

          {/* Withdrawal Input submission field */}
          <div class="bg-white p-4 rounded-3xl border shadow-xs">
            <h4 class="text-xs font-bold text-gray-800 mb-2 font-sans pb-1.5 border-b"><i class="fa-solid fa-wallet text-accent mr-1"></i> नगद निकासी (UPI Withdrawal Verification)</h4>
            
            <form onSubmit={handleWithdrawalRequest} class="space-y-3 text-xs">

              <div class="bg-purple-50 p-3 rounded-2xl text-[10px] text-purple-800 border border-purple-100 space-y-1 leading-snug">
                <p class="font-bold">निकासी के कड़े नियम (Required Anti-Fraud):</p>
                <p>1. न्यूनतम विथड्रावल ₹20 स्वीकृत है (न्यूनतम 10 रेफ़र होने चाहिए)।</p>
                <p>2. उपयोगकर्ता (Referred User) ने कम से कम 3 बार ऐप ओपन किया हो।</p>
                <p>3. पेमेंट एडमिन द्वारा सत्यापित होने पर आपके UPI में 7 दिन के भीतर क्रेडिट कर दिया जावेगा।</p>
              </div>

              <button 
                type="submit" 
                class="w-full py-3.5 bg-primary hover:bg-green-800 text-white font-bold rounded-xl active:scale-95 transition text-xs font-sans shadow-md"
              >
                विथड्रावल रिक्वेस्ट भेजें (Withdraw)
              </button>
            </form>
          </div>

          {/* My referrals tracking lists */}
          <div class="bg-white p-4 rounded-3xl border shadow-xs">
            <h4 class="text-xs font-bold text-gray-800 mb-2 font-sans pb-1.5 border-b">📋 आपके रेफरल्स की स्थिति:</h4>
            
            {myReferrals.length === 0 ? (
              <p class="text-[10px] text-gray-400 text-center py-4 font-sans">अभी तक कोई सन्देश / रेफ़र लिस्ट नहीं मिला है।</p>
            ) : (
              <div class="overflow-x-auto">
                <table class="w-full text-left text-[10px] border-collapse text-gray-600">
                  <thead>
                    <tr class="border-b bg-gray-50 text-[9px] uppercase font-bold text-gray-500">
                      <th class="py-2 px-1">नाम</th>
                      <th class="py-2 px-1">मोबाइल</th>
                      <th class="py-2 px-1">दर्जा</th>
                      <th class="py-2 px-1 text-right">राशि</th>
                    </tr>
                  </thead>
                  <tbody>
                    {myReferrals.map((ref) => (
                      <tr key={ref.id} class="border-b hover:bg-gray-50">

    // Helper to render text messages and parse any maps URLs as safe active buttons
    function renderTextWithLinks(text) {
      if (!text) return "";
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      const parts = text.split(urlRegex);
      return parts.map((part, index) => {
        if (part.match(urlRegex)) {
          return (
            <div key={index} class="mt-2 text-left">
              <a 
                href={part} 
                target="_blank" 
                rel="noopener noreferrer" 
                class="inline-flex items-center space-x-1 px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white font-extrabold text-[10px] rounded-lg tracking-wide uppercase transition active:scale-95 shadow-sm font-sans cursor-pointer"
                onClick={(e) => e.stopPropagation()}
              >
                <i class="fa-solid fa-map-location-dot"></i>
                <span>सटीक मैप्स लोकेशन देखें</span>
              </a>
            </div>
          );
        }
        return <span key={index}>{part}</span>;
      });
    }

    // ──────────────────────────────────────────────────────────
    // Admin Panel Tab Area Component View - Full Featured
    // ──────────────────────────────────────────────────────────
    function AdminPanelView({ onClose, triggerToast, broadcastGlobal, broadcastVillage }) {
      const [password, setPassword] = useState("");
      const [isAuthorized, setIsAuthorized] = useState(false);
      const [adminTab, setAdminTab] = useState("dashboard");
      const [users, setUsers] = useState([]);
      const [referrals, setReferrals] = useState([]);
      const [withdrawals, setWithdrawals] = useState([]);
      const [sosLogs, setSosLogs] = useState([]);
      const [bazaarPosts, setBazaarPosts] = useState([]);
      const [complaints, setComplaints] = useState([]);
      const [annTitle, setAnnTitle] = useState("");
      const [annText, setAnnText] = useState("");
      const [annTarget, setAnnTarget] = useState("All");
      const [searchUser, setSearchUser] = useState("");
      const [editingUser, setEditingUser] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [adminPass, setAdminPass] = useState("gaon@admin2024");
      const [newPass, setNewPass] = useState("");
      const [showPassChange, setShowPassChange] = useState(false);
      const [filterVillage, setFilterVillage] = useState("All");
      const [filterRole, setFilterRole] = useState("All");

      const reloadAdminDb = () => {
        const u = JSON.parse(localStorage.getItem("village_users") || "[]");
        const r = JSON.parse(localStorage.getItem("referrals") || "[]");
        const w = JSON.parse(localStorage.getItem("withdrawals") || "[]");
        const s = JSON.parse(localStorage.getItem("sos_log") || "[]");
        const b = JSON.parse(localStorage.getItem("bazaar_posts") || "[]");
        setUsers(u);
        setReferrals(r);
        setWithdrawals(w);
        setSosLogs(s);
        setBazaarPosts(b);
        // Load complaints: prefer Firebase, fallback to localStorage
        if (dbRef) {
          const allComplaints = [];
          let pending = VILLAGES.length;
          VILLAGES.forEach(v => {
            const vk = getCleanVillagePath(v);
            dbRef.ref(`complaints/${vk}`).once("value").then(snapshot => {
              const data = snapshot.val();
              if (data) {
                Object.keys(data).forEach(k => allComplaints.push({ id: k, ...data[k], gaon: v }));
              }
              pending--;
              if (pending === 0) {
                setComplaints(allComplaints.sort((a, b) => b.timestamp - a.timestamp));
              }
            }).catch(() => { pending--; });
          });
        } else {
          const allComplaints = [];
          VILLAGES.forEach(v => {
            const vk = getCleanVillagePath(v);
            const vc = JSON.parse(localStorage.getItem(`offline_complaints_${vk}`) || "[]");
            vc.forEach(c => allComplaints.push({...c, gaon: v}));
          });
          setComplaints(allComplaints.sort((a,b) => b.timestamp - a.timestamp));
        }
      };

      const handleAuth = (e) => {
        e.preventDefault();
        const stored = localStorage.getItem("admin_pass") || "gaon@admin2024";
        if (password === stored) {
          setIsAuthorized(true);
          reloadAdminDb();
          triggerToast("एडमिन पैनल में आपका स्वागत है! 🔓");
        } else {
          triggerToast("गलत पासवर्ड!", true);
        }
      };

      // Stats
      const stats = {
        totalUsers: users.length,
        activeToday: users.filter(u => u.appOpens > 0).length,
        pendingReferrals: referrals.filter(r => r.status === "Pending").length,
        approvedReferrals: referrals.filter(r => r.status === "Approved").length,
        pendingWithdrawals: withdrawals.filter(w => w.status === "Pending").length,
        totalWithdrawn: withdrawals.filter(w => w.status === "Approved").reduce((sum, w) => sum + (w.amount || 0), 0),
        totalPosts: bazaarPosts.length,
        totalSOS: sosLogs.length,
        totalComplaints: complaints.length,
        resolvedComplaints: complaints.filter(c => c.status === "Resolved").length,
        flagged: referrals.filter(r => r.flagged).length,
      };

      // User management
      const deleteUser = (deviceId) => {
        const updated = users.filter(u => u.deviceId !== deviceId);
        localStorage.setItem("village_users", JSON.stringify(updated));
        reloadAdminDb();
        setConfirmDelete(null);
        triggerToast("यूज़र हटाया गया ✓");
      };

      const banUser = (deviceId) => {
        const updated = users.map(u => u.deviceId === deviceId ? {...u, banned: !u.banned} : u);
        localStorage.setItem("village_users", JSON.stringify(updated));
        reloadAdminDb();
        triggerToast("यूज़र स्टेटस बदला ✓");
      };

      const saveEditUser = () => {
        if (!editingUser) return;
        const updated = users.map(u => u.deviceId === editingUser.deviceId ? editingUser : u);
        localStorage.setItem("village_users", JSON.stringify(updated));
        // Update Firebase too
        if (dbRef) dbRef.ref("users/" + editingUser.deviceId).update(editingUser);
        reloadAdminDb();
        setEditingUser(null);
        triggerToast("यूज़र अपडेट किया गया ✓");
      };

      // Bazaar post management
      const deletePost = (postId) => {
        const updated = bazaarPosts.filter(p => p.id !== postId);
        localStorage.setItem("bazaar_posts", JSON.stringify(updated));
        reloadAdminDb();
        triggerToast("पोस्ट हटाई गई ✓");
      };

      // Complaint management
      const deleteComplaint = (complaint) => {
        const vk = getCleanVillagePath(complaint.gaon);
        if (dbRef && complaint.id && !complaint.id.startsWith("local_")) {
          dbRef.ref(`complaints/${vk}/${complaint.id}`).remove()
            .catch(err => console.error("Firebase complaint delete error", err));
        } else {
          const key = `offline_complaints_${vk}`;
          const current = JSON.parse(localStorage.getItem(key) || "[]");
          const updated = current.filter(c => c.id !== complaint.id);
          localStorage.setItem(key, JSON.stringify(updated));
        }
        reloadAdminDb();
        triggerToast("शिकायत हटाई गई ✓");
      };

      const updateComplaintStatus = (complaint, status) => {
        const vk = getCleanVillagePath(complaint.gaon);
        if (dbRef && complaint.id && !complaint.id.startsWith("local_")) {
          dbRef.ref(`complaints/${vk}/${complaint.id}`).update({ status });
        } else {
          const key = `offline_complaints_${vk}`;
          const current = JSON.parse(localStorage.getItem(key) || "[]");
          const idx = current.findIndex(c => c.id === complaint.id);
          if (idx !== -1) { current[idx].status = status; localStorage.setItem(key, JSON.stringify(current)); }
        }
        reloadAdminDb();
        triggerToast("स्थिति बदली ✓");
      };

      // Referral management
      const processReferralStatusChange = (refId, newStatus) => {
        const refs = JSON.parse(localStorage.getItem("referrals") || "[]");
        const idx = refs.findIndex(r => r.id === refId);
        if (idx !== -1) {
          refs[idx].status = newStatus;
          localStorage.setItem("referrals", JSON.stringify(refs));
          reloadAdminDb();
          triggerToast(`रेफ़रल ${newStatus === "Approved" ? "स्वीकृत" : "अस्वीकृत"} ✓`);
        }
      };

      // Withdrawal management
      const processPayoutStatusChange = (wdId, newStatus) => {
        const wds = JSON.parse(localStorage.getItem("withdrawals") || "[]");
        const idx = wds.findIndex(w => w.id === wdId);
        if (idx !== -1) {
          wds[idx].status = newStatus;
          localStorage.setItem("withdrawals", JSON.stringify(wds));
          reloadAdminDb();
          triggerToast(`भुगतान ${newStatus === "Approved" ? "स्वीकृत" : "अस्वीकृत"} ✓`);
        }
      };

      // Announcement
      const sendAnnouncement = (e) => {
        e.preventDefault();
        if (!annTitle.trim() || !annText.trim()) return;
        if (annTarget === "All") broadcastGlobal(annTitle.trim(), annText.trim(), "announcement");
        else broadcastVillage(annTarget, annTitle.trim(), annText.trim(), "announcement");
        setAnnTitle(""); setAnnText("");
        triggerToast("घोषणा भेजी गई! 📢");
      };

      // Password change
      const changePassword = (e) => {
        e.preventDefault();
        if (!newPass || newPass.length < 6) { triggerToast("पासवर्ड कम से कम 6 अक्षर का होना चाहिए", true); return; }
        localStorage.setItem("admin_pass", newPass);
        setAdminPass(newPass);
        setNewPass("");
        setShowPassChange(false);
        triggerToast("पासवर्ड बदला गया ✓");
      };

      // Data reset
      const clearAllData = (key) => {
        localStorage.setItem(key, JSON.stringify([]));
        reloadAdminDb();
        triggerToast("डेटा साफ़ किया गया ✓");
      };

      // Export data as JSON
      const exportData = () => {
        const data = {
          users: JSON.parse(localStorage.getItem("village_users") || "[]"),
          referrals: JSON.parse(localStorage.getItem("referrals") || "[]"),
          withdrawals: JSON.parse(localStorage.getItem("withdrawals") || "[]"),
          bazaarPosts: JSON.parse(localStorage.getItem("bazaar_posts") || "[]"),
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = "gaon_digital_data.json"; a.click();
        triggerToast("डेटा एक्सपोर्ट हुआ ✓");
      };

      const filteredUsers = users.filter(u => {
        const matchSearch = !searchUser || (u.naam || u.name || "").toLowerCase().includes(searchUser.toLowerCase()) || (u.mobile || "").includes(searchUser);
        const matchVillage = filterVillage === "All" || u.gaon === filterVillage;
        const matchRole = filterRole === "All" || u.role === filterRole;
        return matchSearch && matchVillage && matchRole;
      });

      const ADMIN_TABS = [
        { id: "dashboard", label: "📊 डैशबोर्ड" },
        { id: "users", label: "👥 यूज़र्स" },
        { id: "bazaar", label: "🛒 बाज़ार" },
        { id: "complaints", label: "📋 शिकायतें" },
        { id: "referrals", label: "🤝 रेफरल्स" },
        { id: "withdrawals", label: "💳 निकासी" },
        { id: "sos", label: "🚨 SOS" },
        { id: "announce", label: "📢 घोषणा" },
        { id: "settings", label: "⚙️ सेटिंग्स" },
      ];

      if (!isAuthorized) {
        return (
          <div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl p-6 text-center shadow-2xl max-w-sm w-full border font-sans">
              <div class="w-16 h-16 bg-green-50 rounded-2xl flex items-center justify-center mx-auto mb-3 border border-green-100">
                <span class="text-3xl">🔐</span>
              </div>
              <h3 class="text-lg font-extrabold text-gray-800">Admin Panel</h3>
              <p class="text-[11px] text-gray-400 mt-1 mb-5">गाँव डिजिटल प्रशासन प्रणाली</p>
              <form onSubmit={handleAuth} class="space-y-3 text-xs">
                <input
                  type="password"
                  placeholder="Admin पासवर्ड दर्ज करें..."
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl text-center font-bold tracking-widest focus:border-primary outline-none"
                  required
                />
                <div class="flex gap-2">
                  <button type="submit" class="flex-1 py-3 bg-primary text-white font-bold rounded-xl text-sm">🔓 प्रवेश करें</button>
                  <button type="button" onClick={onClose} class="px-4 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">✕</button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div class="fixed inset-0 bg-[#F1F8E9] z-50 max-w-md w-full mx-auto flex flex-col font-sans text-xs overflow-hidden">
          {/* Header */}
          <div class="bg-primary text-white px-4 py-3 flex items-center justify-between shadow-md shrink-0">
            <div>

                      <label class="block text-[10px] text-gray-500 mb-1 font-bold">शीर्षक *</label>
                      <input type="text" placeholder="जैसे: कृषि सब्सिडी योजना" value={annTitle} onChange={e => setAnnTitle(e.target.value)} class="w-full p-2.5 bg-gray-50 border rounded-xl text-xs outline-none" required />
                    </div>
                    <div>
                      <label class="block text-[10px] text-gray-500 mb-1 font-bold">सन्देश *</label>
                      <textarea rows="4" placeholder="पूरा सन्देश लिखें..." value={annText} onChange={e => setAnnText(e.target.value)} class="w-full p-2.5 bg-gray-50 border rounded-xl text-xs resize-none outline-none" required></textarea>
                    </div>
                    <button type="submit" class="w-full py-3 bg-primary text-white font-bold rounded-xl text-sm">🚀 घोषणा भेजें</button>
                  </form>
                </div>
              </div>
            )}

            {/* ── SETTINGS ── */}
            {adminTab === "settings" && (
              <div class="space-y-3">
                {/* Password Change */}
                <div class="bg-white p-4 rounded-2xl border space-y-2">
                  <div class="flex justify-between items-center">
                    <h4 class="font-bold">🔑 Admin पासवर्ड बदलें</h4>
                    <button onClick={() => setShowPassChange(!showPassChange)} class="text-primary font-bold text-[11px]">{showPassChange ? "रद्द" : "बदलें"}</button>
                  </div>
                  {showPassChange && (
                    <form onSubmit={changePassword} class="space-y-2 pt-2">
                      <input type="password" placeholder="नया पासवर्ड (min 6 अक्षर)" value={newPass} onChange={e => setNewPass(e.target.value)} class="w-full p-2.5 bg-gray-50 border rounded-xl text-xs outline-none" minLength="6" required />
                      <button type="submit" class="w-full py-2.5 bg-primary text-white font-bold rounded-xl">💾 पासवर्ड सहेजें</button>
                    </form>
                  )}
                </div>

                {/* Data Export */}
                <div class="bg-white p-4 rounded-2xl border space-y-2">
                  <h4 class="font-bold">📤 डेटा एक्सपोर्ट</h4>
                  <p class="text-[10px] text-gray-400">यूज़र, पोस्ट, और रेफरल डेटा JSON में डाउनलोड करें</p>
                  <button onClick={exportData} class="w-full py-2.5 bg-blue-600 text-white font-bold rounded-xl text-xs">📥 JSON डाउनलोड करें</button>
                </div>

                {/* Data Management */}
                <div class="bg-white p-4 rounded-2xl border space-y-2">
                  <h4 class="font-bold text-red-700">⚠️ डेटा प्रबंधन (सावधानी!)</h4>
                  {[
                    { label: "बाज़ार पोस्ट साफ़ करें", key: "bazaar_posts", color: "bg-orange-50 text-orange-700 border-orange-200" },
                    { label: "रेफरल लॉग साफ़ करें", key: "referrals", color: "bg-yellow-50 text-yellow-700 border-yellow-200" },
                    { label: "SOS लॉग साफ़ करें", key: "sos_log", color: "bg-red-50 text-red-700 border-red-200" },
                    { label: "निकासी लॉग साफ़ करें", key: "withdrawals", color: "bg-purple-50 text-purple-700 border-purple-200" },
                  ].map(item => (
                    <button key={item.key} onClick={() => clearAllData(item.key)} class={`w-full py-2.5 border rounded-xl font-bold text-xs ${item.color}`}>
                      🗑️ {item.label}
                    </button>
                  ))}
                </div>

                {/* App Info */}
                <div class="bg-white p-4 rounded-2xl border space-y-1 text-[10px] text-gray-500">
                  <h4 class="font-bold text-gray-700 text-xs">ℹ️ App जानकारी</h4>
                  <p>संस्करण: Gaon Digital v2.0</p>
                  <p>कुल यूज़र: {users.length} | कुल पोस्ट: {bazaarPosts.length}</p>
                  <p>Firebase: {dbRef ? "✅ जुड़ा हुआ" : "❌ ऑफलाइन"}</p>
                  <p>Admin Pass: {localStorage.getItem("admin_pass") ? "कस्टम सेट है" : "Default (gaon@admin2024)"}</p>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // Mount GaonDigitalApp inside standard DOM anchor
    const rootElement = document.getElementById("root");
    const reactRoot = ReactDOM.createRoot(rootElement);
    reactRoot.render(<GaonDigitalApp />);
  </script>
</body>
</html>
