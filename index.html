    // Firebase Global Configuration Check
    const firebaseConfig = {

    // Static Setup Configuration Constants
    const VILLAGES = [
      "नंदलालपुर (Nandlalpur)", "देवीपुर (Devipur)", "चांदनीचौक (Chandni Chowk)", "बसकोला (Baskola)"

    const ROLES = [
      { id: "Kisan", label: "👨‍🌾 किसान (Kisan)" },

    ];

    const BAZAAR_CATEGORIES = ["Anaj", "Dudh_Makhhan", "Sashya", "Aujaur", "Other"];
    const BAZAAR_CATEGORIES_LABELS = {
      "Anaj": "🌾 अनाज व फसलें",
      "Dudh_Makhhan": "🥛 दूध व डेयरी उत्पाद",
      "Sashya": "🌱 सब्जियाँ व फल",
      "Aujaur": "🛠️ कृषि उपकरण / औजार",
      "Other": "📦 अन्य उत्पाद"
    };

    // Pre-seeded Directory database starts fresh as empty
    const SEED_USERS = [];

    // Pre-seeded bazaar records starts fresh as empty
    const SEED_POSTS = [];

    // Helper to safely extract clean ASCII paths for Firebase references
    const getCleanVillagePath = (gaonName) => {
      if (!gaonName) return "default_village";
      const englishMatch = gaonName.match(/\(([^)]+)\)/);
      const rawKey = englishMatch ? englishMatch[1] : gaonName;
      return rawKey.replace(/[^a-zA-Z0-9]/g, "_").toLowerCase();
    };

    // High fidelity photo compressor to avoid LocalStorage constraints & Firebase upload exceptions
    const compressAndLoadPhoto = (file, callback) => {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          let width = img.width;
          let height = img.height;
          const MAX_SIZE = 400; // Optimum photo resolution for fast load
          if (width > height) {
            if (width > MAX_SIZE) {
              height *= MAX_SIZE / width;
              width = MAX_SIZE;
            }
          } else {
            if (height > MAX_SIZE) {
              width *= MAX_SIZE / height;
              height = MAX_SIZE;
            }
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          const compressed = canvas.toDataURL("image/jpeg", 0.6); // 60% compression quality standard
          callback(compressed);
        };
        img.onerror = () => {
          // Fallback to uncompressed in case of image load error
          callback(event.target.result);
        };
        img.src = event.target.result;
      };
      reader.onerror = () => {
        console.error("FileReader failed");
      };
      reader.readAsDataURL(file);
    };

    // Main Master App Component
    function GaonDigitalApp() {
      // 1. Core State Definition
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState("ghar"); // ghar | bazaar | chat | refer | mera
      const [allUsers, setAllUsers] = useState([]);
      const [allPosts, setAllPosts] = useState([]);
      const [unreadNotifications, setUnreadNotifications] = useState(0);
      const [notifications, setNotifications] = useState([]);
      const [showNotificationsView, setShowNotificationsView] = useState(false);
      const [showDirectoryView, setShowDirectoryView] = useState(false);
      const [showAddPostModal, setShowAddPostModal] = useState(false);
      const [showAdminPanel, setShowAdminPanel] = useState(false);
      const [showSOSAlert, setShowSOSAlert] = useState(false);
      const [currentLocation, setCurrentLocation] = useState(null);
      const [toast, setToast] = useState(null);

      // Back button interception / overlay tracking stack
      const overlayStackRef = useRef([]);

      const openOverlay = useCallback((setterFunc, value = true) => {
        setterFunc(value);
        window.history.pushState({ overlayOpen: true }, "");
        overlayStackRef.current.push(() => {
          setterFunc(null);
        });
      }, []);

      useEffect(() => {
        const handlePopState = (event) => {
          if (overlayStackRef.current.length > 0) {
            const closeFunc = overlayStackRef.current.pop();
            closeFunc();
          } else if (activeTab !== "ghar") {
            // If on another tab, return to home tab
            setActiveTab("ghar");
          }
        };
        window.addEventListener("popstate", handlePopState);
        return () => {
          window.removeEventListener("popstate", handlePopState);
        };
      }, [activeTab]);

      // Initialize Application
      useEffect(() => {
        // App Load Opens Counter Setup
        const totalOpens = localStorage.getItem("app_opens") 
          ? parseInt(localStorage.getItem("app_opens")) + 1 
          : 1;
        localStorage.setItem("app_opens", totalOpens);

        // Fetch User profile
        const savedUser = localStorage.getItem("gaon_user");
        if (savedUser) {
          try {
            const parsed = JSON.parse(savedUser);
            parsed.appOpens = totalOpens;
            localStorage.setItem("gaon_user", JSON.stringify(parsed));
            setUser(parsed);
            
            // Sync user's openings counter with the master index
            updateMasterUserDb(parsed.deviceId, { appOpens: totalOpens });
          } catch(err) {
            console.error("User parse error", err);
          }
        }

        // Initialize localStorage arrays with fallback seed data if empty
        if (!localStorage.getItem("village_users")) {
          localStorage.setItem("village_users", JSON.stringify(SEED_USERS));
        }
        if (!localStorage.getItem("bazaar_posts")) {
          localStorage.setItem("bazaar_posts", JSON.stringify(SEED_POSTS));
        }
        if (!localStorage.getItem("referrals")) {
          localStorage.setItem("referrals", JSON.stringify([]));
        }
        if (!localStorage.getItem("withdrawals")) {
          localStorage.setItem("withdrawals", JSON.stringify([]));
        }
        if (!localStorage.getItem("sos_log")) {
          localStorage.setItem("sos_log", JSON.stringify([]));
        }

        // Load reactive local states
        loadAppData();

        // Request permissions in order: GPS → Notification → Camera
        const requestPermissionsSequentially = async () => {
          // 1. GPS Location
          if (navigator.geolocation) {
            await new Promise((resolve) => {
              navigator.geolocation.getCurrentPosition(
                (pos) => { console.log("GPS permission granted"); resolve(); },
                (err) => { console.warn("GPS permission denied:", err); resolve(); },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
              );
            });
          }

          // 2. Notification
          if ("Notification" in window && Notification.permission === "default") {
            try {
              await Notification.requestPermission();
              console.log("Notification permission:", Notification.permission);
            } catch (e) {
              console.warn("Notification permission error:", e);
            }
          }

          // 3. Camera
          if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
              stream.getTracks().forEach(t => t.stop()); // immediately release camera
              console.log("Camera permission granted");
            } catch (e) {
              console.warn("Camera permission denied:", e);
            }
          }
        };
        requestPermissionsSequentially();
      }, []);

      // Real-time synchronization of Firebase alerts & announcements + registered users
      useEffect(() => {
        if (!user || !dbRef) return;

        // 0. Listen for all registered village users in Firebase to keep contact directories in perfect sync
        const usersRef = dbRef.ref("users");
        const onUsersValue = usersRef.on("value", (snapshot) => {
          const remoteUsers = snapshot.val();
          if (remoteUsers) {
            const list = Object.values(remoteUsers);
            const localUsers = JSON.parse(localStorage.getItem("village_users") || "[]");
            const mergedMap = {};
            SEED_USERS.forEach(u => { mergedMap[u.deviceId] = u; });
            localUsers.forEach(u => { mergedMap[u.deviceId] = u; });
            list.forEach(u => { if (u && u.deviceId) mergedMap[u.deviceId] = u; });
            
            const mergedList = Object.values(mergedMap);
            localStorage.setItem("village_users", JSON.stringify(mergedList));
            setAllUsers(mergedList);
          }
        });

        // Ensure current active user is registered dynamically in the Firebase central index
        if (user && user.deviceId) {
          usersRef.child(user.deviceId).set(user)
            .then(() => console.log("Self user profile synchronized to Firebase successfully"))
            .catch(err => console.debug("Firebase profile sync offline fallback enabled", err));
        }

        // 1. Listen for global broadcasts (expanded limit to last 100 entries)
        const globalRef = dbRef.ref("broadcasts");
        const onGlobalAdded = globalRef.limitToLast(100).on("child_added", (snapshot) => {
          const data = snapshot.val();
          if (data && data.timestamp > user.createdAt) {
            const key = `notifications_${user.deviceId}`;
            const local = JSON.parse(localStorage.getItem(key) || "[]");
            if (!local.some(n => n.id === snapshot.key)) {
              const newNot = {
                id: snapshot.key,
                title: data.title,
                message: data.message,
                type: data.type || "announcement",
                timestamp: data.timestamp,
                read: false
              };
              local.push(newNot);
              localStorage.setItem(key, JSON.stringify(local));
              setNotifications(local.sort((a, b) => b.timestamp - a.timestamp));
              setUnreadNotifications(local.filter(n => !n.read).length);
              triggerToast(`📢 ${data.title}`);
              if (data.type === "sos") {
                playEmergencySound();
                setShowSOSAlert(true);
              }
 
              // Trigger real physical Android notification and vibration
              sendAndroidNotification(data.title, data.message, data.type || "general");
            }
          }
        });

        // 2. Listen for village-specific urgent SOS alerts (expanded limit to last 100 entries)
        const path = getCleanVillagePath(user.gaon);
        const alertsRef = dbRef.ref(`village_alerts/${path}`);
        const onAlertAdded = alertsRef.limitToLast(100).on("child_added", (snapshot) => {
          const data = snapshot.val();
          if (data && data.timestamp > user.createdAt && data.senderId !== user.deviceId) {
            const key = `notifications_${user.deviceId}`;
            const local = JSON.parse(localStorage.getItem(key) || "[]");
            if (!local.some(n => n.id === snapshot.key)) {
              const newNot = {
                id: snapshot.key,
                title: data.title,
                message: data.message,
                type: data.type || "sos",
                timestamp: data.timestamp,
                read: false
              };
              local.push(newNot);
              localStorage.setItem(key, JSON.stringify(local));
              setNotifications(local.sort((a, b) => b.timestamp - a.timestamp));
              setUnreadNotifications(local.filter(n => !n.read).length);
              triggerToast(`🚨 ${data.title}`);
              if (data.type === "sos") {
                playEmergencySound();
                setShowSOSAlert(true);
              }

              // Trigger real physical Android notification and vibration
              sendAndroidNotification(data.title, data.message, data.type || "sos");
            }
          }
        });

        // 3. Listen for village bazaar posts in real-time
        const bazaarRef = dbRef.ref(`bazaar_posts/${path}`);
        bazaarRef.on("value", (snapshot) => {
          const data = snapshot.val();
          const list = [];
          if (data) {
            Object.keys(data).forEach(k => list.push({ id: k, ...data[k] }));
          }
          const sorted = list.sort((a, b) => b.timestamp - a.timestamp);
          localStorage.setItem("bazaar_posts", JSON.stringify(sorted));
          setAllPosts(sorted);
        });

        return () => {
          usersRef.off("value");
          globalRef.off("child_added", onGlobalAdded);
          alertsRef.off("child_added", onAlertAdded);
          bazaarRef.off("value");
        };
      }, [user]);

      // Reload databases from localStorage
      const loadAppData = () => {
        const users = JSON.parse(localStorage.getItem("village_users") || "[]");
        const posts = JSON.parse(localStorage.getItem("bazaar_posts") || "[]");
        setAllUsers(users);
        setAllPosts(posts.sort((a,b) => b.timestamp - a.timestamp));

        // Load notifications for this device
        if (localStorage.getItem("gaon_user")) {
          const u = JSON.parse(localStorage.getItem("gaon_user"));
          const notSec = JSON.parse(localStorage.getItem(`notifications_${u.deviceId}`) || "[]");
          setNotifications(notSec.sort((a,b) => b.timestamp - a.timestamp));
          setUnreadNotifications(notSec.filter(n => !n.read).length);
        }
      };

      // Trigger standard in-app notifications
      const triggerToast = (msg, isError = false) => {
        setToast({ text: msg, error: isError });
        setTimeout(() => setToast(null), 3000);

        // Tactile vibration feedback on physical devices
        if (typeof AndroidApp !== "undefined") {
          try {
            AndroidApp.triggerVibration();
          } catch (e) {
            console.error("Vibration failed:", e);
          }
        }
      };

      // Helper to dynamically update individual master database entries
      const updateMasterUserDb = (deviceId, updates) => {
        const users = JSON.parse(localStorage.getItem("village_users") || "[]");
        const idx = users.findIndex(u => u.deviceId === deviceId);
        if (idx !== -1) {
          users[idx] = { ...users[idx], ...updates };
          localStorage.setItem("village_users", JSON.stringify(users));
          setAllUsers(users);
        }
      };

      // 2. Onboarding complete logic
      const handleOnboardFinish = (profileData) => {
        // Fingerprinting logic
        const fp = [navigator.userAgent, screen.width, screen.height, navigator.language, navigator.hardwareConcurrency, new Date().getTimezoneOffset()].join("||");
        const deviceId = btoa(fp).slice(0, 32);

        // Retrieve existing records
        const users = JSON.parse(localStorage.getItem("village_users") || "[]");

        // ANTI-FRAUD Verification 1: Prevent duplicate device registrations
        const isSelfDeviceDuplicated = users.some(u => u.deviceId === deviceId);
        if (isSelfDeviceDuplicated) {
          // Instead of onboarding again, log them in instantly as security measure
          const existingAcc = users.find(u => u.deviceId === deviceId);
          localStorage.setItem("gaon_user", JSON.stringify(existingAcc));
          setUser(existingAcc);
          triggerToast("आपका डिवाइस पहले से रजिस्टर्ड है! स्वागत है दोबारा।");
          loadAppData();
          return;
        }

        // ANTI-FRAUD Verification 2: Prevent duplicate mobile numbers
        const isMobileRegistered = users.some(u => u.mobile === profileData.mobile);
        if (isMobileRegistered) {
          triggerToast("यह मोबाइल नंबर पहले से registered है!", true);
          return;
        }

        const refCode = deviceId.slice(0, 8).toUpperCase();
        const finalUser = {
          deviceId,
          naam: profileData.naam,
          gaon: profileData.gaon,
          mobile: profileData.mobile,
          role: profileData.role,
          photo: profileData.photo || "",
          referralCode: refCode,
          createdAt: Date.now(),
          appOpens: parseInt(localStorage.getItem("app_opens") || "1")
        };

        // Check and validate Referral Code (Manual Input or URL parameter)
        const params = new URLSearchParams(window.location.search);
        const manualRef = profileData.referralCodeInput;
        const urlRef = params.get("ref");
        const activeRef = manualRef || urlRef;
        if (activeRef) {
          handleReferralAward(activeRef, finalUser);
        }

        users.push(finalUser);
        localStorage.setItem("village_users", JSON.stringify(users));
        localStorage.setItem("gaon_user", JSON.stringify(finalUser));
        
        setUser(finalUser);
        triggerToast("रजिस्ट्रेशन सफल रहा! 🏡");
        loadAppData();
      };

      // Process referrals dynamically
      const handleReferralAward = (code, newUser) => {
        const users = JSON.parse(localStorage.getItem("village_users") || "[]");
        const referrals = JSON.parse(localStorage.getItem("referrals") || "[]");

        const upperCode = code.toUpperCase();
        // Look up who owns this referral code
        const sponsor = users.find(u => u.referralCode === upperCode);

        if (!sponsor) return; // Silent discard if referrer invalid

        // Refer-fraud checks
        if (sponsor.deviceId === newUser.deviceId) {
          console.warn("Self referral detected and rejected.");
          return;
        }

        // Check rate limiter triggers: 5+ referrals in past 24 hours
        const refCountLast24h = referrals.filter(r => 
          r.referrerId === sponsor.deviceId && 
          (Date.now() - r.timestamp) < 24 * 3600 * 1000
        ).length;

        const isFlaggedState = refCountLast24h >= 4; // Including this one, it will make 5

        const newReferralRecord = {
          id: "ref_" + Math.random().toString(36).slice(2, 9),
          referrerId: sponsor.deviceId,
          referrerName: sponsor.naam,
          referredId: newUser.deviceId,
          referredName: newUser.naam,
          mobile: newUser.mobile,
          gaon: newUser.gaon,
          timestamp: Date.now(),
          status: "Pending", // Pending, Ready, Approved, Flagged
          flagged: isFlaggedState,
          amount: 2.0
        };

        referrals.push(newReferralRecord);
        localStorage.setItem("referrals", JSON.stringify(referrals));

        // Append notification to sponsor
        createInAppNotification(
          sponsor.deviceId,
          "💰 नया रेफरल!",
          `बधाई हो, ${newUser.naam} आपके रेफरल लिंक से जुड़े हैं। ₹2 सत्यापन हो रहा है।`,
          "referral"
        );
      };

      // Unified helper to inject notifications to custom local storage
      const createInAppNotification = (targetDeviceId, title, message, type) => {
        const key = `notifications_${targetDeviceId}`;
        const targetList = JSON.parse(localStorage.getItem(key) || "[]");
        targetList.push({
          id: "not_" + Math.random().toString(36).slice(2,9),
          title,
          message,
          type,
          timestamp: Date.now(),
          read: false
        });
        localStorage.setItem(key, JSON.stringify(targetList));
        loadAppData();

        // Connect real device notification & vibration using JavascriptInterface
        if (user && targetDeviceId === user.deviceId) {
          if (typeof AndroidApp !== "undefined") {
            try {
              AndroidApp.showNotification(title, message);
              AndroidApp.triggerVibration();
            } catch (e) {
              console.error("AndroidApp active call failed:", e);
            }
          }
        }
      };

      // Broadcast notifications to all users of a specific village
      const broadcastVillageNotification = (villageName, title, message, type) => {
        const users = JSON.parse(localStorage.getItem("village_users") || "[]");
        users.forEach(u => {
          if (u.gaon === villageName) {
            createInAppNotification(u.deviceId, title, message, type);
          }
        });

        // Sync to Firebase realtime database node
        if (dbRef) {
          const path = getCleanVillagePath(villageName);
          dbRef.ref(`village_alerts/${path}`).push({
            title,
            message,
            type,
            timestamp: Date.now(),
            senderId: user ? user.deviceId : "system"
          });
        }
      };

      // Broadcast notification globally to everyone
      const broadcastGlobalNotification = (title, message, type) => {
        const users = JSON.parse(localStorage.getItem("village_users") || "[]");
        users.forEach(u => {
          createInAppNotification(u.deviceId, title, message, type);
        });

        // Sync to Firebase realtime database node
        if (dbRef) {
          dbRef.ref("broadcasts").push({
            title,
            message,
            type,
            timestamp: Date.now(),
            senderId: user ? user.deviceId : "system"
          });
        }
      };

      // Send Android system-level high importance notification
      const sendAndroidNotification = (title, message, type = "general") => {
        if (typeof AndroidApp === "undefined") return;
        try {
          if (typeof AndroidApp.showHighPriorityNotification === "function") {
            AndroidApp.showHighPriorityNotification(title, message, type);
          } else {
            AndroidApp.showNotification(title, message);
          }
          if (type === "sos") {
            AndroidApp.triggerVibration();
            setTimeout(() => AndroidApp.triggerVibration(), 400);
            setTimeout(() => AndroidApp.triggerVibration(), 800);
          } else {
            AndroidApp.triggerVibration();
          }
        } catch (e) {
          console.error("Android notification error:", e);
        }
      };

      // Play emergency alarm sound
      const playEmergencySound = () => {
        try {
          const audio = new Audio("https://www.image2url.com/r2/default/audio/1780481190276-dbe3f3e9-7544-4697-a500-c09a8d429f44.m4a");
          audio.volume = 1.0;
          audio.play().catch(e => console.warn("Audio play failed:", e));
        } catch (e) {
          console.warn("Emergency sound error:", e);
        }
      };

      // Trigger SOS Warning System
      const triggerEmergencySOS = () => {
        if (!user) return;

        // Play emergency alarm sound immediately
        playEmergencySound();

        // Immediate physical vibration feedback
        if (typeof AndroidApp !== "undefined") {
          try {
            AndroidApp.triggerVibration();
            setTimeout(() => AndroidApp.triggerVibration(), 500);
          } catch (e) {
            console.error(e);
          }
        }
        
        triggerToast("⏱️ आपकी सटीक लाइव लोकेशन प्राप्त की जा रही है...");

        const sendSOSWithLocation = (lat, lng) => {
          const locationLink = (lat && lng) ? `geo:${lat},${lng}?q=${lat},${lng}(SOS+Location)` : "";
          const logs = JSON.parse(localStorage.getItem("sos_log") || "[]");
          logs.push({
            id: "sos_" + Date.now(),
            user: user.naam,
            gaon: user.gaon,
            mobile: user.mobile,
            timestamp: Date.now(),
            lat: lat || "N/A",
            lng: lng || "N/A"
          });
          localStorage.setItem("sos_log", JSON.stringify(logs));

          const mapsMsgText = locationLink 
            ? `${user.naam} को तुरंत मदद की आवश्यकता है! फ़ोन नंबर: ${user.mobile}। यहाँ क्लिक कर लाइव लोकेशन देखें: ${locationLink}`
            : `${user.naam} को तुरंत मदद की आवश्यकता है! फ़ोन नंबर: ${user.mobile}। (सटीक लोकेशन प्राप्त नहीं हो पाई)`;

          // Alert ALL users globally (every gaon)
          broadcastGlobalNotification(
            "🚨 आपातकालीन सहायता (Emergency SOS)",
            mapsMsgText,
            "sos"
          );

          triggerToast("🚨 इमरजेंसी अलर्ट सभी गाँवों के सभी लोगों को भेज दिया गया है!");
          setShowSOSAlert(true);
        };

        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const latitude = pos.coords.latitude;
              const longitude = pos.coords.longitude;
              setCurrentLocation({ lat: latitude, lng: longitude });
              sendSOSWithLocation(latitude, longitude);
            },
            (err) => {
              console.warn("Location error:", err);
              // Fallback to existing currentLocation state or null
              const existingLat = currentLocation?.lat;
              const existingLng = currentLocation?.lng;
              sendSOSWithLocation(existingLat, existingLng);
            },
            { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
          );
        } else {
          const existingLat = currentLocation?.lat;
          const existingLng = currentLocation?.lng;
          sendSOSWithLocation(existingLat, existingLng);
        }
      };

      // Mark notifications as read complete
      const markAllNotificationsRead = () => {
        if (!user) return;
        const key = `notifications_${user.deviceId}`;
        const list = JSON.parse(localStorage.getItem(key) || "[]");
        const updated = list.map(n => ({ ...n, read: true }));
        localStorage.setItem(key, JSON.stringify(updated));
        loadAppData();
        triggerToast("सभी सूचनाएं पढ़ ली गई हैं!");
      };

      // Add a clean Bazar Listing post
      const handleAddBazaarListing = (postData) => {
        if (!user) return;
        const pList = JSON.parse(localStorage.getItem("bazaar_posts") || "[]");
        
        const newPost = {
          id: "post_" + Math.random().toString(36).slice(2, 9),
          name: postData.name,
          price: postData.price,
          type: postData.type, // Bechna | Kharidna
          category: postData.category,
          photo: postData.photo,
          description: postData.description || "",
          sellerName: user.naam,
          sellerRole: user.role,
          sellerMobile: user.mobile,
          gaon: user.gaon,
          timestamp: Date.now()
        };

        pList.push(newPost);
        localStorage.setItem("bazaar_posts", JSON.stringify(pList));
        // Sync to Firebase bazaar_posts node
        if (dbRef) {
          const vPath = getCleanVillagePath(user.gaon);
          dbRef.ref(`bazaar_posts/${vPath}`).push(newPost)
            .catch(err => console.debug("Bazaar Firebase sync fallback", err));
        }
        loadAppData();
        setShowAddPostModal(false);

        // Notify village of new trading listing
        const itemTypeHindi = postData.type === "Bechna" ? "बेचने हेतु उपलब्ध" : "खरीदने की मांग";
        broadcastVillageNotification(
          user.gaon,
          `📢 नया बाज़ार पोस्ट! [${itemTypeHindi}]`,
          `${newPost.name} - ₹${newPost.price} | विक्रेता: ${user.naam}`,
          "bazaar"
        );

        triggerToast("आपका सामान बाज़ार में जोड़ दिया गया है!");
      };

      // Update User Profile info
      const handleProfileUpdate = (updatedUserFields) => {
        if (!user) return;
        const savedUser = JSON.parse(localStorage.getItem("gaon_user"));
        const updatedUser = { ...savedUser, ...updatedUserFields };
        
        // Save to state + localStorage
        localStorage.setItem("gaon_user", JSON.stringify(updatedUser));
        setUser(updatedUser);

        // Update in the central list database
        updateMasterUserDb(user.deviceId, updatedUserFields);
        triggerToast("प्रोफ़ाइल अपडेट सफलतापूर्वक पूर्ण!");
      };

      // Safe view redirection wrapper
      const handleGridNavigation = (target) => {
        if (target === "sampark") {
          openOverlay(setShowDirectoryView);
        } else if (target === "notifications") {
          openOverlay(setShowNotificationsView);
        } else if (target === "sos") {
          setActiveTab("ghar");
          triggerEmergencySOS();
        } else {
          setActiveTab(target);
        }
      };

      // View Rendering dispatcher
      if (!user) {
        return (
          <Onboarding 
            onOnboardComplete={handleOnboardFinish} 
            triggerToast={triggerToast} 
            toast={toast}
          />
        );
      }

      return (
        <div class="flex flex-col w-full flex-grow pb-24 relative min-h-screen">
          {/* Top Bar Navigation */}
          <header class="bg-primary text-white p-4 flex items-center justify-between sticky top-0 z-40 rounded-b-2xl shadow-md">
            <div class="flex items-center space-x-2" onClick={() => { setShowDirectoryView(false); setShowNotificationsView(false); setActiveTab("ghar"); }}>
              <span class="text-2xl">🏡</span>
              <h1 class="text-lg font-bold tracking-tight">Gaon Digital</h1>
            </div>
            
            <div class="flex items-center space-x-3">
              {/* Notification Indicator Bell */}
              <button 
                class="relative p-2 focus:outline-none transition active:scale-95 cursor-pointer" 
                onClick={() => { openOverlay(setShowNotificationsView); setShowDirectoryView(false); }}
              >
                <i class="fa-solid fa-bell text-xl"></i>
                {unreadNotifications > 0 && (
                  <span class="absolute top-1 right-1 bg-red-600 text-white font-bold text-[10px] rounded-full w-5 h-5 flex items-center justify-center animate-bounce">
                    {unreadNotifications}
                  </span>
                )}
              </button>
            </div>
          </header>

          {/* Toast Notification HUD */}
          {toast && (
            <div class={`fixed top-16 left-1/2 -translate-x-1/2 z-50 w-11/12 max-w-sm p-4 rounded-xl shadow-lg border text-sm flex items-center space-x-3 transition duration-300 ${toast.error ? 'bg-red-50 border-red-300 text-red-800' : 'bg-green-50 border-green-300 text-green-800'}`}>
              <i class={`fa-solid ${toast.error ? "fa-circle-exclamation text-red-500" : "fa-circle-check text-green-500"} text-lg`}></i>
              <p class="font-medium font-sans flex-1 leading-snug">{toast.text}</p>
            </div>
          )}

          {/* Core App View switcher container */}
          <main class="p-4 flex-grow flex flex-col">
            {showNotificationsView ? (
              <NotificationsView 
                notifications={notifications} 
                onMarkAllRead={markAllNotificationsRead} 
                onClose={() => setShowNotificationsView(false)}
              />
            ) : showDirectoryView ? (
              <DirectoryView 
                allUsers={allUsers} 
                onClose={() => setShowDirectoryView(false)} 
              />
            ) : (
              <div>
                {activeTab === "ghar" && (
                  <HomeView 
                    user={user} 
                    onNavigate={handleGridNavigation} 
                    triggerEmergency={triggerEmergencySOS}
                  />
                )}
                {activeTab === "bazaar" && (
                  <BazaarView 
                    allPosts={allPosts} 
                    user={user} 
                    onAddPostClick={() => openOverlay(setShowAddPostModal)} 
                  />
                )}
                {activeTab === "chat" && (
                  <ChatView 
                    user={user} 
                    dbRef={dbRef} 
                    triggerToast={triggerToast}
                    openOverlay={openOverlay}
                    broadcastVillage={broadcastVillageNotification}
                    broadcastGlobal={broadcastGlobalNotification}
                  />
                )}
                {activeTab === "refer" && (
                  <ReferView 
                    user={user} 
                    allUsers={allUsers}
                    triggerToast={triggerToast} 
                  />
                )}
                {activeTab === "mera" && (
                  <MeraView 
                    user={user} 
                    allPosts={allPosts}
                    onUpdateProfile={handleProfileUpdate} 
                    triggerToast={triggerToast}
                    openOverlay={openOverlay}
                  />
                )}
              </div>
            )}
          </main>

          {/* Floating SOS HUD Overlay */}
          {showSOSAlert && (
            <div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div class="bg-white rounded-3xl p-6 text-center shadow-2xl relative w-full border-t-8 border-red-600">
                <span class="text-6xl animate-bounce block mb-4">🚨</span>
                <h3 class="text-2xl font-bold text-red-600 font-sans mb-1">आपातकालीन सूचना भेजी गई!</h3>
                <p class="text-sm text-gray-500 mb-6">आपके गांव <span class="font-semibold text-gray-800">{user.gaon}</span> के सभी निवासियों को आपका आपातकालीन मदद संदेश भेज दिया गया है।</p>
                
                <div class="space-y-4 mb-6">
                  <h4 class="text-sm font-bold text-gray-700 text-left border-b pb-1 font-sans">महत्वपूर्ण हेल्पलाइन नंबर्स:</h4>
                  <div class="grid grid-cols-2 gap-3">
                    <a href="tel:108" class="p-3 bg-red-50 text-red-700 rounded-xl flex items-center justify-center font-bold font-sans space-x-2 active:scale-95 transition">
                      <i class="fa-solid fa-truck-medical"></i><span>एम्बुलेंस (108)</span>
                    </a>
                    <a href="tel:100" class="p-3 bg-blue-550 bg-blue-50 text-blue-700 rounded-xl flex items-center justify-center font-bold font-sans space-x-2 active:scale-95 transition">
                      <i class="fa-solid fa-shield-halved"></i><span>पुलिस (100)</span>
                    </a>
                  </div>
                </div>

                {currentLocation ? (
                  <button 
                    onClick={() => {
                      window.location.href = `geo:${currentLocation.lat},${currentLocation.lng}?q=${currentLocation.lat},${currentLocation.lng}(My+Location)`;
                    }}
                    class="w-full p-3.5 bg-green-700 text-white font-bold rounded-xl flex items-center justify-center space-x-2 shadow-lg hover:bg-green-800 transition mb-4 active:scale-95 cursor-pointer"
                  >
                    <i class="fa-solid fa-location-dot"></i>
                    <span>📍 अपना लोकेशन शेयर करें</span>
                  </button>
                ) : (
                  <button 
                    onClick={() => triggerToast("लोकेशन खोजने का प्रयास कर रहे हैं... अनुमति स्वीकृत करें।")}
                    class="w-full p-3.5 bg-gray-500 text-white font-bold rounded-xl flex items-center justify-center space-x-2"
                  >
                    <span>📍 लोकेशन खोजने में असमर्थ है</span>
                  </button>
                )}

                <button 
                  onClick={() => setShowSOSAlert(false)} 
                  class="font-bold underline text-gray-600 px-4 py-2 hover:text-black transition"
                >
                  बंद करें (Close)
                </button>
              </div>
            </div>
          )}

          {/* Add Post Slideup modal wrapper */}
          {showAddPostModal && (
            <AddPostModal 
              onClose={() => setShowAddPostModal(false)} 
              onSubmit={handleAddBazaarListing} 
              triggerToast={triggerToast}
            />
          )}

          {/* Gated Administrative Modal Sheet */}
          {showAdminPanel && (
            <AdminPanelView 
              onClose={() => setShowAdminPanel(false)}
              triggerToast={triggerToast}
              broadcastGlobal={broadcastGlobalNotification}
              broadcastVillage={broadcastVillageNotification}
            />
          )}

          {/* Bottom Custom Navigation bar */}
          <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 z-40 max-w-md w-full bg-white border-t border-gray-200 rounded-t-2xl shadow-[0_-4px_12px_rgba(0,0,0,0.06)] px-2 py-2 flex justify-around">
            {[
              { id: "ghar", label: "घर", icon: "fa-house" },
              { id: "bazaar", label: "बाज़ार", icon: "fa-shop" },
              { id: "chat", label: "शिकायतें", icon: "fa-clipboard-list" },
              { id: "refer", label: "कमाओ", icon: "fa-gift" },
              { id: "mera", label: "मेरा", icon: "fa-user" }
            ].map((tab) => (
              <button 
                key={tab.id}
                onClick={() => {
                  setShowDirectoryView(false);
                  setShowNotificationsView(false);
                  setActiveTab(tab.id);
                }}
                class={`flex flex-col items-center justify-center py-2 px-3 rounded-xl transition-all duration-200 ${
                  (!showDirectoryView && !showNotificationsView && activeTab === tab.id) 
                    ? "text-primary scale-105 font-bold" 
                    : "text-gray-400 hover:text-gray-600"
                }`}
                style={{ minWidth: "60px", minHeight: "48px" }}
              >
                <i class={`fa-solid ${tab.icon} text-lg mb-1`}></i>
                <span class="text-[11px] font-sans tracking-wide leading-none">{tab.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    }

    // ──────────────────────────────────────────────────────────
    // Onboarding Subscreen component
    // ──────────────────────────────────────────────────────────
    function Onboarding({ onOnboardComplete, triggerToast, toast }) {
      const [name, setName] = useState("");
      const [village, setVillage] = useState("");
      const [mobile, setMobile] = useState("");
      const [role, setRole] = useState("");
      const [photo, setPhoto] = useState("");
      const [referralCodeInput, setReferralCodeInput] = useState("");

      const handlePhotoSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        compressAndLoadPhoto(file, (compressedBase64) => {
          setPhoto(compressedBase64);
        });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!name.trim()) return triggerToast("कृपया अपना नाम लिखें!");
        if (!village) return triggerToast("कृपया अपने गांव का चयन करें!");
        if (!mobile || mobile.length !== 10 || isNaN(mobile)) {
          return triggerToast("कृपया 10 अंकों का मान्य मोबाइल नंबर दर्ज करें!", true);
        }
        if (!role) return triggerToast("कृपया अपने कार्य / रोल का चयन करें!");

        onOnboardComplete({
          naam: name.trim(),
          gaon: village,
          mobile: mobile.trim(),
          role: role,
          photo: photo,
          referralCodeInput: referralCodeInput.trim()
        });
      };

      return (
        <div class="flex-grow p-6 flex flex-col justify-center bg-gradient-to-b from-[#E8F5E9] via-bgLight to-[#FFFFFF] min-h-screen">
          <div class="text-center mb-6">
            <span class="text-6xl mb-3 block">🏡</span>
            <h2 class="text-3xl font-extrabold text-primary font-sans">Gaon Digital</h2>
            <p class="text-sm text-gray-600 font-sans mt-1">अपना गाँव, अपनी डिजिटल चौपाल</p>
          </div>

          {toast && (
            <div class={`mb-4 w-full p-4 rounded-xl shadow-lg border text-sm flex items-center space-x-3 transition duration-300 ${toast.error ? 'bg-red-50 border-red-300 text-red-800' : 'bg-green-50 border-green-300 text-green-800'}`}>
              <i class={`fa-solid ${toast.error ? "fa-circle-exclamation text-red-500" : "fa-circle-check text-green-500"} text-lg`}></i>
              <p class="font-medium font-sans flex-grow">{toast.text}</p>
            </div>
          )}

          <div class="bg-white rounded-3xl p-6 shadow-xl border border-gray-150 animate-fadeIn">
            <h3 class="text-lg font-bold text-gray-800 text-center mb-4 pb-2 border-b font-sans">
              📍 एक बार का निःशुल्क रजिस्ट्रेशन
            </h3>

            <form onSubmit={handleSubmit} class="space-y-4">
              <div>
                <label class="block text-xs font-bold text-gray-700 mb-1 font-sans">आपका पूरा नाम (Naam) *</label>
                <div class="relative">
                  <i class="fa-solid fa-user absolute left-3 top-3.5 text-gray-400"></i>
                  <input 
                    type="text" 
                    placeholder="जैसे: हरीश पटेल"
                    value={name} 
                    onChange={e => setName(e.target.value)}
                    class="w-full pl-9 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:outline-none transition text-sm font-sans"
                    required
                  />
                </div>
              </div>

              <div>
                <label class="block text-xs font-bold text-gray-700 mb-1 font-sans">अपना गाँव चुनें (Village) *</label>
                <div class="relative">
                  <i class="fa-solid fa-map-pin absolute left-3 top-3.5 text-gray-400"></i>
                  <select 
                    value={village} 
                    onChange={e => setVillage(e.target.value)}
                    class="w-full pl-9 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:outline-none transition appearance-none text-sm font-sans"
                    required
                  >
                    <option value="">--गाँव चुनें--</option>
                    {VILLAGES.map(v => <option key={v} value={v}>{v}</option>)}
                  </select>
                </div>
              </div>

              <div>
                <label class="block text-xs font-bold text-gray-700 mb-1 font-sans">मोबाइल नंबर (10 अंकों का) *</label>
                <div class="relative">
                  <i class="fa-solid fa-phone absolute left-3 top-3.5 text-gray-400"></i>
                  <input 
                    type="tel" 
                    maxLength="10" 
                    placeholder="जैसे: 9876543210"
                    value={mobile} 
                    onChange={e => setMobile(e.target.value.replace(/\D/g, ""))}
                    class="w-full pl-9 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:outline-none transition text-sm font-sans"
                    required
                  />
                </div>
              </div>

              <div>
                <label class="block text-xs font-bold text-gray-700 mb-1 font-sans">आप क्या काम करते हैं (Role) *</label>
                <div class="relative">
                  <i class="fa-solid fa-briefcase absolute left-3 top-3.5 text-gray-400"></i>
                  <select 
                    value={role} 
                    onChange={e => setRole(e.target.value)}
                    class="w-full pl-9 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:outline-none transition appearance-none text-sm font-sans"
                    required
                  >
                    <option value="">--अपना कार्य चुनें--</option>
                    {ROLES.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
                  </select>
                </div>
              </div>

              <div>
                <label class="block text-xs font-bold text-gray-700 mb-1 font-sans">रेफरल कोड (Referral Code - वैकल्पिक)</label>
                <div class="relative">
                  <i class="fa-solid fa-gift absolute left-3 top-3.5 text-gray-400"></i>
                  <input 
                    type="text" 
                    placeholder="जैसे: ABCDEFGH"
                    value={referralCodeInput} 
                    onChange={e => setReferralCodeInput(e.target.value.toUpperCase())}
                    class="w-full pl-9 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:outline-none transition text-sm font-sans"
                  />
                </div>
              </div>

              <div>
                <label class="block text-xs font-bold text-gray-700 mb-1 font-sans">प्रोफ़ाइल फ़ोटो (Profile Photo - वैकल्पिक)</label>
                <div class="mt-1 flex items-center space-x-3">
                  {photo ? (
                    <img src={photo} class="w-14 h-14 rounded-full object-cover border-2 border-primary" alt="Profile" />
                  ) : (
                    <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center border border-dashed border-gray-300">
                      <i class="fa-solid fa-camera text-gray-400 text-lg"></i>
                    </div>
                  )}
                  <label class="px-4 py-2 bg-gray-100 border border-gray-300 hover:bg-gray-200 rounded-xl cursor-pointer text-xs font-bold transition font-sans">
                    अपलोड करें
                    <input type="file" accept="image/*" class="hidden" onChange={handlePhotoSelect} />
                  </label>
                  {photo && (
                    <button type="button" onClick={() => setPhoto("")} class="text-red-500 font-bold text-xs underline">हटाएं</button>
                  )}
                </div>
              </div>

              <button 
                type="submit" 
                class="w-full py-3.5 bg-primary hover:bg-green-800 text-white font-bold rounded-xl shadow-lg transition duration-200 flex items-center justify-center space-x-2 text-base active:scale-95 font-sans"
              >
                <span>रजिस्टर करें 🇮🇳</span>
              </button>
            </form>

            <div class="text-center text-[10px] text-gray-400 mt-6 font-sans">
              Developed by <span class="font-extrabold text-gray-500">amrritxd</span>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────────────────────────────────────────────────
    // Ghar / Home Tab Dashboard View
    // ──────────────────────────────────────────────────────────
    function HomeView({ user, onNavigate, triggerEmergency }) {
      const [showSOSConfirm, setShowSOSConfirm] = useState(false);

      return (
        <div class="space-y-4 animate-fadeIn">
          {/* Personalised Welcome Greeting Card */}
          <div class="bg-gradient-to-r from-primary to-green-700 text-white p-5 rounded-3xl shadow-lg relative overflow-hidden">
            <div class="relative z-10">

    // ──────────────────────────────────────────────────────────
    // Add Post Modals Component overlays
